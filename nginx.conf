
server {
    listen 443 ssl;
    server_name namanitwork.tech;
    client_max_body_size 1500M;
    ssl_certificate /etc/letsencrypt/live/namanitwork.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/namanitwork.tech/privkey.pem; # managed by Certbot

    # Security Headers
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /home/namanit/nonononnn/frontend/build;
    index index.php index.html index.htm;
   location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
         fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
    }

    location /phpmyadmin {
    alias /usr/share/phpmyadmin;  # This should point to your phpMyAdmin installation
    index index.php;

    location ~ ^/phpmyadmin/(.+\.php)$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /usr/share/phpmyadmin/$1;  # Ensure this is correct
    }

    location ~ ^/phpmyadmin/(.+\.(gif|jpe?g|png|ico|css|js))$ {
        alias /usr/share/phpmyadmin/$1;  # This serves static assets
    }
}

location /lol {
        return 301 https://www.google.com;
    }


















    location / {
        try_files $uri /index.html /compiling.html =404;
    }
    
    location = /compiling.html {
        alias /home/namanit/nonononnn/compiling.html;
    }

    location /static/ {
        alias /home/namanit/nonononnn/frontend/build/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ /\.ht {
        deny all;
    }
     proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;



}


server {
    if ($host = namanitwork.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name namanitwork.tech;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;





}
