<!-- VoidPanel Modern Top Navbar -->
<nav id="vp-topbar">
    <div id="vp-topbar-left">
        <button id="vp-sidebar-toggle" onclick="document.getElementById('vp-sidebar').classList.toggle('collapsed')" title="Toggle Sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <a href="/control/" id="vp-logo">
            <img src="/static/icons/fav.png" width="28" height="28" alt="VoidPanel">
            <span>Void<strong>Panel</strong></span>
        </a>
    </div>

    <div id="vp-topbar-search">
        <div class="vp-search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="vp-search-input" placeholder="Search features..." autocomplete="off" list="vp-search-options">
            <datalist id="vp-search-options">
                <option value="DNS Management"></option>
                <option value="Auto SSL"></option>
                <option value="Email Wizard"></option>
                <option value="FileManager"></option>
                <option value="Terminal"></option>
                <option value="Cron Jobs"></option>
                <option value="Database Wizard"></option>
                <option value="FTP Wizard"></option>
                <option value="PHP Selector"></option>
                <option value="Subdomain"></option>
                <option value="Python Setup"></option>
                <option value="Backup Wizard"></option>
                <option value="Dashboard"></option>
            </datalist>
        </div>
    </div>

    <div id="vp-topbar-right">
        <a href="https://{{ primarydomain }}" target="_blank" id="vp-domain-chip">
            {% if favicon_url %}<img src="{{ favicon_url }}" width="16" height="16" onerror="this.style.display='none'" alt="">{% endif %}
            <span>{{ primarydomain }}</span>
            {% if primarydomainstatus %}
            <span class="vp-ssl-dot secure" title="SSL Active"></span>
            {% else %}
            <span class="vp-ssl-dot insecure" title="No SSL"></span>
            {% endif %}
        </a>
        <div class="vp-topbar-divider"></div>
        <div id="vp-user-menu" onclick="this.classList.toggle('open')">
            <div class="vp-user-avatar">{{ request.user|stringformat:"s"|first|upper }}</div>
            <span class="vp-user-name">{{ request.user }}</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            <div class="vp-user-dropdown">
                <a href="/logout"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</a>
            </div>
        </div>
    </div>
</nav>

<style>
/* ========================================
   VOIDPANEL TOP NAVBAR - COMPLETE OVERRIDE
   ======================================== */
:root {
    --vp-bg:        #080d1a;
    --vp-surface:   #0e1628;
    --vp-surface2:  #131f36;
    --vp-border:    rgba(255,255,255,0.07);
    --vp-accent:    #6366f1;
    --vp-accent2:   #8b5cf6;
    --vp-text:      #e2e8f0;
    --vp-muted:     #64748b;
    --vp-green:     #10b981;
    --vp-red:       #ef4444;
    --vp-topbar-h:  58px;
    --vp-sidebar-w: 240px;
}

/* Reset old template layout artifacts */
body, html { margin:0; padding:0; overflow-x:hidden; }
.page-loader-wrapper { background: var(--vp-bg) !important; }
.navbar.navbar-fixed-top { display: none !important; }
#left-sidebar { display: none !important; }
.rightbar { display: none !important; }
#right-sidebar { display: none !important; }
.overlay { display: none !important; }
#main-content {
    margin-left: var(--vp-sidebar-w) !important;
    margin-top: var(--vp-topbar-h) !important;
    padding: 28px 28px 60px !important;
    background: transparent !important;
    min-height: calc(100vh - var(--vp-topbar-h));
}

/* ---- Topbar ---- */
#vp-topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--vp-topbar-h);
    background: rgba(8,13,26,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--vp-border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    z-index: 9000;
    font-family: 'Inter', sans-serif;
}

#vp-topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: calc(var(--vp-sidebar-w) - 20px);
}

#vp-sidebar-toggle {
    background: transparent;
    border: none;
    color: var(--vp-muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
}
#vp-sidebar-toggle:hover { background: rgba(255,255,255,0.06); color: white; }

#vp-logo {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
    color: white;
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: -0.3px;
}
#vp-logo strong { font-weight: 700; color: #a5b4fc; }
#vp-logo img { border-radius: 8px; }

#vp-topbar-search { flex: 1; max-width: 380px; }
.vp-search-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--vp-border);
    border-radius: 10px;
    padding: 0 14px;
    transition: all 0.2s;
}
.vp-search-wrap:focus-within {
    border-color: rgba(99,102,241,0.5);
    background: rgba(99,102,241,0.07);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}
.vp-search-wrap svg { color: var(--vp-muted); flex-shrink: 0; }
#vp-search-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--vp-text);
    font-size: 0.85rem;
    width: 100%;
    height: 36px;
    font-family: 'Inter', sans-serif;
}
#vp-search-input::placeholder { color: var(--vp-muted); }

#vp-topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
}

#vp-domain-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--vp-border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--vp-text);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.2s;
}
#vp-domain-chip:hover { background: rgba(255,255,255,0.08); color: white; text-decoration: none; }
.vp-ssl-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
}
.vp-ssl-dot.secure { background: var(--vp-green); box-shadow: 0 0 6px var(--vp-green); }
.vp-ssl-dot.insecure { background: var(--vp-red); box-shadow: 0 0 6px var(--vp-red); }

.vp-topbar-divider { width: 1px; height: 22px; background: var(--vp-border); }

#vp-user-menu {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 8px;
    transition: all 0.2s;
    color: var(--vp-text);
    font-size: 0.84rem;
}
#vp-user-menu:hover { background: rgba(255,255,255,0.06); }
.vp-user-avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--vp-accent), var(--vp-accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
}
.vp-user-name { font-weight: 500; }

.vp-user-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--vp-surface);
    border: 1px solid var(--vp-border);
    border-radius: 10px;
    min-width: 150px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    overflow: hidden;
    z-index: 9999;
}
#vp-user-menu.open .vp-user-dropdown { display: block; }
.vp-user-dropdown a {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 11px 14px;
    color: var(--vp-text);
    text-decoration: none;
    font-size: 0.84rem;
    transition: background 0.15s;
}
.vp-user-dropdown a:hover { background: rgba(255,255,255,0.06); color: var(--vp-red); }
</style>

<script>
document.getElementById('vp-search-input').addEventListener('input', function() {
    const v = this.value;
    const redirects = {
        "DNS Management": "/control/eadns/?domain={{ primarydomain }}/",
        "Auto SSL": "/control/runssl/{{ primarydomain }}",
        "Email Wizard": "/control/listemail/{{ primarydomain }}/",
        "FileManager": "/control/filemanager/",
        "Terminal": "/control/terminal/",
        "Cron Jobs": "/control/cron/{{ primarydomain }}",
        "Database Wizard": "/control/dbconnect/{{ primarydomain }}/",
        "FTP Wizard": "/control/ftp/{{ primarydomain }}/",
        "PHP Selector": "/control/",
        "Subdomain": "/control/subdomain/{{ primarydomain }}",
        "Python Setup": "/control/python/{{ primarydomain }}",
        "Backup Wizard": "/control/backup/{{ primarydomain }}",
        "Dashboard": "/control/",
    };
    if (redirects[v]) window.location.href = redirects[v];
});
document.addEventListener('click', function(e) {
    const menu = document.getElementById('vp-user-menu');
    if (menu && !menu.contains(e.target)) menu.classList.remove('open');
});
</script>
