<style>
:root {
    --vp-topbar-h: 58px;
    --vp-sidebar-w: 240px;
    --vp-green: #10b981;
    --vp-red: #ef4444;
}

/* ========================================
   VOIDPANEL TOP NAVBAR - COMPLETE OVERRIDE
   ======================================== */

/* Reset old template layout artifacts */
body, html { margin:0; padding:0; overflow-x:hidden; }
.page-loader-wrapper { background: var(--vp-bg) !important; }
.navbar.navbar-fixed-top { display: none !important; }
#left-sidebar { display: none !important; }
.rightbar { display: none !important; }
#right-sidebar { display: none !important; }
.overlay { display: none !important; }
#main-content {
    margin-left: var(--vp-sidebar-w) !important;
    margin-top: var(--vp-topbar-h) !important;
    padding: 28px 28px 60px !important;
    background: transparent !important;
    min-height: calc(100vh - var(--vp-topbar-h));
}

/* ---- Topbar ---- */
#vp-topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--vp-topbar-h);
    background: var(--vp-topbar-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--vp-border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    z-index: 9000;
    font-family: 'Inter', sans-serif;
    color: var(--vp-text);
}

#vp-topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: calc(var(--vp-sidebar-w) - 20px);
}

#vp-sidebar-toggle {
    background: transparent;
    border: none;
    color: var(--vp-muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
}
#vp-sidebar-toggle:hover { background: rgba(255,255,255,0.06); color: white; }

#vp-logo {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
    color: var(--vp-text-bright);
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: -0.3px;
}
#vp-logo strong { font-weight: 700; color: #a5b4fc; }
#vp-logo img { border-radius: 8px; }

#vp-topbar-search { flex: 1; max-width: 380px; }
.vp-search-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--vp-border);
    border-radius: 10px;
    padding: 0 14px;
    transition: all 0.2s;
}
.vp-search-wrap:focus-within {
    border-color: rgba(99,102,241,0.5);
    background: rgba(99,102,241,0.07);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}
.vp-search-wrap svg { color: var(--vp-muted); flex-shrink: 0; }
#vp-search-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--vp-text);
    font-size: 0.85rem;
    width: 100%;
    height: 36px;
    font-family: 'Inter', sans-serif;
}
#vp-search-input::placeholder { color: var(--vp-muted); }

#vp-topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
}

#vp-domain-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--vp-border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--vp-text);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.2s;
}
#vp-domain-chip:hover { background: rgba(255,255,255,0.08); color: white; text-decoration: none; }
.vp-ssl-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
}
.vp-ssl-dot.secure { background: var(--vp-green); box-shadow: 0 0 6px var(--vp-green); }
.vp-ssl-dot.insecure { background: var(--vp-red); box-shadow: 0 0 6px var(--vp-red); }

.vp-topbar-divider { width: 1px; height: 22px; background: var(--vp-border); }

#vp-user-menu {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 8px;
    transition: all 0.2s;
    color: var(--vp-text);
    font-size: 0.84rem;
}
#vp-user-menu:hover { background: rgba(255,255,255,0.06); }
.vp-user-avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--vp-accent), var(--vp-accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
}
.vp-user-name { font-weight: 500; }

.vp-user-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--vp-surface);
    border: 1px solid var(--vp-border);
    border-radius: 10px;
    min-width: 150px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    overflow: hidden;
    z-index: 9999;
}
#vp-user-menu.open .vp-user-dropdown { display: block; }
.vp-user-dropdown a {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 11px 14px;
    color: var(--vp-text);
    text-decoration: none;
    font-size: 0.84rem;
    transition: background 0.15s;
}
.vp-user-dropdown a:hover { background: var(--vp-surface2); color: var(--vp-red); }

#vp-theme-toggle {
    background: transparent;
    border: none;
    color: var(--vp-muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
}
#vp-theme-toggle:hover { background: var(--vp-surface2); color: var(--vp-text-bright); }

html[data-theme="dark"] .sun-icon { display: block !important; }
html[data-theme="dark"] .moon-icon { display: none !important; }
html[data-theme="light"] .sun-icon { display: none !important; }
html[data-theme="light"] .moon-icon { display: block !important; }

/* ═══════════════════════════════════════════════════════════
   ADMIN DASHBOARD — MOBILE RESPONSIVE
   ═══════════════════════════════════════════════════════════ */

/* ── Tablet: 992px and below ── */
@media (max-width: 992px) {
    #vp-topbar-search { max-width: 220px !important; }
    #vp-topbar-left { min-width: unset !important; }
}

/* ── Mobile: 768px and below ── */
@media (max-width: 768px) {
    /* Sidebar: hidden off-screen by default, slides in on toggle */
    #vp-sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        height: 100vh !important;
        z-index: 10000 !important;
        transform: translateX(-100%) !important;
        transition: transform 0.28s cubic-bezier(.4,0,.2,1) !important;
        overflow-y: auto !important;
        width: 260px !important;
        box-shadow: 4px 0 30px rgba(0,0,0,0.5) !important;
    }
    /* When sidebar is open (toggle adds class via JS) */
    #vp-sidebar.mobile-open {
        transform: translateX(0) !important;
    }
    /* collapsed class no longer makes it invisible since we use transform */
    #vp-sidebar.collapsed {
        transform: translateX(-100%) !important;
    }

    /* Sidebar backdrop overlay */
    #vp-mob-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 9999;
        backdrop-filter: blur(3px);
    }
    #vp-mob-backdrop.active { display: block; }

    /* Main content: full width */
    #main-content {
        margin-left: 0 !important;
        margin-top: var(--vp-topbar-h) !important;
        padding: 16px 12px 60px !important;
        width: 100% !important;
    }

    /* Topbar: compact */
    #vp-topbar {
        padding: 0 12px !important;
    }
    #vp-topbar-left { min-width: unset !important; gap: 10px !important; }

    /* Hide search on mobile */
    #vp-topbar-search { display: none !important; }

    /* Hide domain chip and dividers on mobile */
    #vp-domain-chip,
    .vp-topbar-divider { display: none !important; }

    /* Show only avatar + menu on right */
    #vp-topbar-right { gap: 6px !important; }

    /* Tables: horizontal scroll */
    .table-responsive-auto table,
    table.vp-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }

    /* Card grids: 2 columns */
    .vp-grid-3,
    .vp-grid-4,
    [class*="col-md-4"],
    [class*="col-md-3"] { width: 50% !important; }

    /* Full-width single column */
    .vp-grid-sm-1 { grid-template-columns: 1fr !important; }

    /* Buttons: wrap */
    .vp-btn-group,
    .d-flex.gap-2 { flex-wrap: wrap !important; }

    /* Modals: full screen */
    .modal-dialog { margin: 8px auto !important; max-width: 96vw !important; }
    .modal-glass,
    .modal-glass-wide { max-width: 96vw !important; width: 96vw !important; padding: 20px 14px !important; }
}

/* ── Extra small: 480px ── */
@media (max-width: 480px) {
    #vp-topbar-right .vp-user-name { display: none !important; }
    #main-content { padding: 12px 8px 60px !important; }
    h1, h2 { font-size: 1.1rem !important; }
}
</style>

<script>
document.getElementById('vp-search-input').addEventListener('input', function() {
    const v = this.value;
    const redirects = {
        "DNS Management": "/control/eadns/?domain={{ primarydomain }}/",
        "Auto SSL": "/control/runssl/{{ primarydomain }}",
        "Email Wizard": "/control/listemail/{{ primarydomain }}/",
        "FileManager": "/control/filemanager/",
        "Terminal": "/control/terminal/",
        "Cron Jobs": "/control/cron/{{ primarydomain }}",
        "Database Wizard": "/control/dbconnect/{{ primarydomain }}/",
        "FTP Wizard": "/control/ftp/{{ primarydomain }}/",
        "PHP Selector": "/control/",
        "Subdomain": "/control/subdomain/{{ primarydomain }}",
        "Python Setup": "/control/python/{{ primarydomain }}",
        "Backup Wizard": "/control/backup/{{ primarydomain }}",
        "Dashboard": "/control/",
    };
    if (redirects[v]) window.location.href = redirects[v];
});
document.addEventListener('click', function(e) {
    const menu = document.getElementById('vp-user-menu');
    if (menu && !menu.contains(e.target)) menu.classList.remove('open');
});
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    if (current === 'dark') {
        /* Light theme — Coming Soon */
        _vpShowComingSoon();
    } else {
        /* Force back to dark if somehow on light */
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('vp-theme', 'dark');
    }
    /* -- Original toggle kept for future use --
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('vp-theme', next);
    -- end -- */
}
function _vpShowComingSoon() {
    var old = document.getElementById('vp-cs-toast');
    if (old) old.remove();
    var toast = document.createElement('div');
    toast.id = 'vp-cs-toast';
    toast.innerHTML = '<span style="font-size:1.1rem;">🌙</span> <span>Light Theme — <strong>Coming Soon</strong></span>';
    Object.assign(toast.style, {
        position:'fixed', bottom:'28px', right:'28px',
        background:'linear-gradient(135deg,#1e1b4b,#312e81)',
        color:'#e0e7ff', padding:'13px 22px', borderRadius:'12px',
        boxShadow:'0 8px 32px rgba(99,102,241,0.35)',
        border:'1px solid rgba(129,140,248,0.3)',
        display:'flex', alignItems:'center', gap:'10px',
        fontSize:'0.88rem', fontWeight:'600', zIndex:'99999',
        opacity:'0', transform:'translateY(12px)',
        transition:'opacity 0.28s ease, transform 0.28s ease',
        pointerEvents:'none',
    });
    document.body.appendChild(toast);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
        toast.style.opacity='1'; toast.style.transform='translateY(0)';
    }));
    setTimeout(()=>{
        toast.style.opacity='0'; toast.style.transform='translateY(12px)';
        setTimeout(()=>toast.remove(), 300);
    }, 2800);
}

/* ── Mobile sidebar toggle ── */
(function() {
    // Define toggleSidebar globally immediately so it is available even if called early
    window.toggleSidebar = function() {
        var sidebar = document.getElementById('vp-sidebar');
        if (!sidebar) return;

        var backdrop = document.getElementById('vp-mob-backdrop');
        if (!backdrop) {
            backdrop = document.createElement('div');
            backdrop.id = 'vp-mob-backdrop';
            document.body.appendChild(backdrop);
            backdrop.addEventListener('click', function() {
                sidebar.classList.remove('mobile-open');
                backdrop.classList.remove('active');
                document.body.style.overflow = '';
            });
        }

        var isMobile = window.innerWidth <= 768;
        if (isMobile) {
            var isOpen = sidebar.classList.contains('mobile-open');
            if (isOpen) {
                sidebar.classList.remove('mobile-open');
                backdrop.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.add('mobile-open');
                backdrop.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        } else {
            sidebar.classList.toggle('collapsed');
        }
    };

    // Setup backdrop and link listeners once DOM is ready
    function initSidebarToggle() {
        var sidebar = document.getElementById('vp-sidebar');
        if (!sidebar) return;

        var backdrop = document.getElementById('vp-mob-backdrop');
        if (!backdrop) {
            backdrop = document.createElement('div');
            backdrop.id = 'vp-mob-backdrop';
            document.body.appendChild(backdrop);
        }

        backdrop.addEventListener('click', function() {
            sidebar.classList.remove('mobile-open');
            backdrop.classList.remove('active');
            document.body.style.overflow = '';
        });

        /* Close sidebar when a nav link is clicked on mobile */
        sidebar.querySelectorAll('a').forEach(function(link) {
            link.addEventListener('click', function() {
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('mobile-open');
                    backdrop.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSidebarToggle);
    } else {
        initSidebarToggle();
    }
})();
</script>
