<style>
    /* Container for chatbot button and text */
    .chatbot-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        cursor: pointer;
        z-index: 1000;
        font-family: Arial, sans-serif;
    }

    /* Chatbot icon */
    .chatbot-icon {
        width: 50px;
        height: 50px;
        background-color:var(--dark-color); /* Blue background */
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
    }

    .chatbot-icon img {
        width: 28px;
        height: 28px;
    }

    .chatbot-icon:hover {
        transform: scale(1.1);
    }

    /* Floating text */
    .chatbot-text {
        background-color: #007bff; /* Blue background */
        color: #fff; /* White text color */
        padding: 10px 15px;
        border-radius: 20px;
        margin-right: 10px;
        font-size: 14px;
        font-weight: bold;
        white-space: nowrap;
        transition: opacity 0.3s ease, transform 0.3s ease;
        opacity: 0; /* Hidden by default */
        transform: translateX(10px);
    }

    /* Show text on hover */
    .chatbot-container:hover .chatbot-text {
        opacity: 1;
        transform: translateX(0);
    }
</style>

</div>
