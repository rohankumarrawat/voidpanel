<!-- VoidPanel Modern Right Floating Actions -->
<style>
    /* Hide old right sidebar / icon bar entirely */
    .right_icon_bar,
    .rightbar,
    #right-sidebar { display: none !important; }

    /* ---- FAB Container ---- */
    #vp-fab-cluster {
        position: fixed;
        bottom: 28px;
        right: 24px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 12px;
        z-index: 9500;
        font-family: 'Inter', sans-serif;
    }

    /* ---- Sub action buttons (hidden by default) ---- */
    .vp-fab-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        opacity: 0;
        transform: translateY(12px) scale(0.95);
        pointer-events: none;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #vp-fab-cluster.open .vp-fab-actions {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: all;
    }

    .vp-fab-action {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
    }
    .vp-fab-action:hover { text-decoration: none; }

    .vp-fab-label {
        background: rgba(8, 13, 26, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.08);
        color: #e2e8f0;
        padding: 5px 12px;
        border-radius: 8px;
        font-size: 0.78rem;
        font-weight: 500;
        white-space: nowrap;
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        transform: translateX(8px);
        opacity: 0;
        transition: all 0.2s ease;
    }
    .vp-fab-action:hover .vp-fab-label {
        transform: translateX(0);
        opacity: 1;
    }

    .vp-fab-btn {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        color: #94a3b8;
        cursor: pointer;
        flex-shrink: 0;
    }
    .vp-fab-btn:hover {
        transform: scale(1.1);
        border-color: rgba(99,102,241,0.4);
        color: #a5b4fc;
        box-shadow: 0 8px 24px rgba(99,102,241,0.2);
    }
    .vp-fab-btn.blue:hover  { border-color: rgba(59,130,246,0.4); color: #93c5fd; box-shadow: 0 8px 24px rgba(59,130,246,0.2); }
    .vp-fab-btn.green:hover { border-color: rgba(16,185,129,0.4); color: #6ee7b7; box-shadow: 0 8px 24px rgba(16,185,129,0.2); }
    .vp-fab-btn.red:hover   { border-color: rgba(239,68,68,0.4);  color: #fca5a5; box-shadow: 0 8px 24px rgba(239,68,68,0.2); }
    .vp-fab-btn.amber:hover { border-color: rgba(245,158,11,0.4); color: #fcd34d; box-shadow: 0 8px 24px rgba(245,158,11,0.2); }

    /* ---- Main FAB toggle ---- */
    #vp-fab-main {
        width: 50px;
        height: 50px;
        border-radius: 14px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(99,102,241,0.4), 0 0 0 0 rgba(99,102,241,0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        animation: vp-pulse 3s ease infinite;
    }
    #vp-fab-main:hover {
        transform: scale(1.08) rotate(45deg);
        box-shadow: 0 8px 28px rgba(99,102,241,0.5);
    }
    #vp-fab-cluster.open #vp-fab-main {
        transform: rotate(45deg);
        background: linear-gradient(135deg, #ef4444, #dc2626);
        box-shadow: 0 4px 20px rgba(239,68,68,0.4);
        animation: none;
    }
    @keyframes vp-pulse {
        0%, 100% { box-shadow: 0 4px 20px rgba(99,102,241,0.4), 0 0 0 0 rgba(99,102,241,0.2); }
        50%       { box-shadow: 0 4px 20px rgba(99,102,241,0.4), 0 0 0 10px rgba(99,102,241,0); }
    }

    #vp-fab-main svg { transition: transform 0.3s ease; }
</style>

<div id="vp-fab-cluster">
    <div class="vp-fab-actions">
        <a href="/control/terminal/" class="vp-fab-action">
            <span class="vp-fab-label">Terminal</span>
            <div class="vp-fab-btn">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            </div>
        </a>
        <a href="/control/filemanager/" target="_blank" class="vp-fab-action">
            <span class="vp-fab-label">File Manager</span>
            <div class="vp-fab-btn blue">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            </div>
        </a>
        <a href="/control/runssl/{{ primarydomain }}" class="vp-fab-action">
            <span class="vp-fab-label">SSL Certificate</span>
            <div class="vp-fab-btn green">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
        </a>
        <a href="/control/listemail/{{ primarydomain }}/" class="vp-fab-action">
            <span class="vp-fab-label">Email</span>
            <div class="vp-fab-btn amber">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
        </a>
        <a href="/logout" class="vp-fab-action">
            <span class="vp-fab-label">Logout</span>
            <div class="vp-fab-btn red">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
        </a>
        <a href="https://voidpanel.com/docs" target="_blank" class="vp-fab-action">
            <span class="vp-fab-label">Documentation</span>
            <div class="vp-fab-btn">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
        </a>
    </div>

    <!-- Main FAB Toggle -->
    <button id="vp-fab-main" onclick="document.getElementById('vp-fab-cluster').classList.toggle('open')" title="Quick Actions">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
</div>

<script>
    // Close FAB when clicking outside
    document.addEventListener('click', function(e) {
        const fab = document.getElementById('vp-fab-cluster');
        if (fab && !fab.contains(e.target)) {
            fab.classList.remove('open');
        }
    });
</script>
