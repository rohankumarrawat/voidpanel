<!doctype html>
<html lang="en">
<head>
    <title>Account Setup in Progress — VoidPanel</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/static/fav.png" type="image/x-icon">
    
    <link rel="stylesheet" href="/static/static/css/plugins/fontawesome-all.min.css">
    <!-- ★ Theme init ★ -->
    <script>(function(){localStorage.setItem('vp-theme','dark');var t='dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--void-bg, #07091a);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card {
            background: rgba(13,17,35,0.9);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 480px; width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        .icon-wrap {
            width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 24px;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff;
            box-shadow: 0 0 40px rgba(99,102,241,0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(99,102,241,0.4); }
            50% { box-shadow: 0 0 60px rgba(99,102,241,0.7); }
        }
        h1 {
            font-size: 1.4rem; font-weight: 800;
            color: #f1f5f9; margin-bottom: 12px;
        }
        p {
            font-size: 0.88rem; color: #94a3b8;
            line-height: 1.7; margin-bottom: 28px;
        }
        .spinner {
            display: inline-block;
            width: 10px; height: 10px; border-radius: 50%;
            background: #6366f1;
            box-shadow: 16px 0 0 #22d3ee, 32px 0 0 #10b981;
            animation: dots 1.2s infinite;
            margin-bottom: 28px;
        }
        @keyframes dots {
            0%, 80%, 100% { opacity: 1; }
            40% { opacity: 0.2; }
        }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; border-radius: 12px; border: none;
            font-size: 0.88rem; font-weight: 700; cursor: pointer;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            color: #fff; text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .meta {
            margin-top: 20px;
            font-size: 0.75rem; color: #475569;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap"><i class="fa-solid fa-gears"></i></div>
    <h1>Setting Up Your Account</h1>
    <p>
        Your hosting account is being provisioned. This usually takes <strong style="color:#f1f5f9;">15–60 seconds</strong>.
        Please wait a moment and then refresh this page.
    </p>
    <div class="spinner"></div>
    <br><br>
    <a href="/control/" class="btn" onclick="this.innerHTML='<i class=\'fa-solid fa-circle-notch fa-spin\'></i> Checking...'">
        <i class="fa-solid fa-rotate-right"></i> Check Again
    </a>
    <p class="meta">
        Logged in as: <strong style="color:#94a3b8;">{{ username }}</strong><br>
        If this takes more than 5 minutes, please open a support ticket.
    </p>
</div>
<script>
    // Auto-refresh every 10 seconds
    setTimeout(() => location.reload(), 10000);
</script>
</body>
</html>
