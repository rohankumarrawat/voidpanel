<!doctype html>
<html lang="en">

<head>
    <title>:: VoidPanel :: Upload</title>
    <meta charset="utf-8">

 <link rel="icon" href="/static/fav.png" type="image/x-icon">
    <!-- VENDOR CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/font-awesome/css/font-awesome.min.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="/static/static/css/plugins/fontawesome-all.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/dropify/css/dropify.min.css">

    <!-- MAIN CSS -->
    <link rel="stylesheet" href="/static/assets/css/main.css?v=2">

</head>

<body class="font-nunito active-dark-mode">

    <div id="wrapper" class="theme-cyan">

        <!-- Page Loader -->
              <div class="page-loader-wrapper" style="background: var(--void-bg, #080c14) !important;">
        <div class="loader">
            <div class="m-t-30" style="display: flex; justify-content: center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="130" height="30" viewBox="0 0 180 40" role="img" aria-label="VoidPanel">
                  <rect x="0" y="4" width="34" height="34" rx="8" ry="8" fill="rgba(255,255,255,0.12)"/>
                  <rect x="7" y="13" width="20" height="4" rx="1.5" fill="#ffffff" opacity="0.9"/>
                  <rect x="7" y="19.5" width="14" height="4" rx="1.5" fill="#ffffff" opacity="0.65"/>
                  <rect x="7" y="26" width="10" height="4" rx="1.5" fill="#60a5fa" opacity="0.95"/>
                  <text x="43" y="28" font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="-0.5" fill="#ffffff">Void</text>
                  <text x="91" y="28" font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="-0.5" fill="#60a5fa">Panel</text>
                </svg>
            </div>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
            <p style="color: var(--text-secondary, #475569) !important;">Please wait...</p>
        </div>
    </div>


        <!-- Top navbar div start -->

        <!-- main left menu -->




        <!-- mani page content body part -->



        <form id="uploadForm" enctype="multipart/form-data">
            <div id="saved" class="alert alert-success" style="display: none;">
                <strong>Success!</strong> File Uploaded
              </div>
              <div id="error" class="alert alert-danger" style="display: none;">
                <strong>Danger!</strong> Cannot Upload File
              </div>

            <div class="col-lg-6 col-md-12" style="margin-top: 250px; margin-left: 350px;">
                <div class="card">
                    <div class="header">
                        <h2>Location <small>{{location}}</small></h2>
                    </div>

                    <div class="body">
                        <input type="file" id="file" name="file" class="dropify" required>
                        <input type="text" id="file_path" name="file_path" hidden value="{{location}}">

                    </div>
                    {% if lolo %}

                    <center><button id="myButton" type="button" class="btn btn-danger"
                     >Full Disk Used</button>
                    {% else %}
                    <center><button id="myButton" type="button" class="btn btn-success"
                            onclick="uploadFile()">Upload</button>
                    </center>
                    {% endif %}
                    <br>
                    <div id="progress" style="display: none;">
                        <div class="progress">
                            <div id="pbar" class="progress-bar progress-bar-success progress-bar-striped active"
                                role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                                style="width: 0%">

                            </div>

                        </div>
                    </div>
                    <br>
                </div>


            </div>

        </form>




        <script>
            function uploadFile() {
                var myList = {{ data| safe}};
                var formData = new FormData();
                var fileInput = $('#file')[0];
                var filePath = $('#file_path').val();
                var file = fileInput.files[0];
                if (!file) return;
                var searchString = file.name;

                formData.append('file', file);
                formData.append('file_path', filePath);

                if (myList.includes(searchString)) {
                    if (!confirm("File Already Exist! Do you want to Overwrite?")) {
                        return;
                    }
                }

                const progressBar = document.getElementById('pbar');
                const progressContainer = document.getElementById('progress');
                progressContainer.style.display = 'block';
                progressBar.style.width = '0%';
                progressBar.setAttribute('aria-valuenow', '0');
                progressBar.innerText = '0%';

                $.ajax({
                    url: "{% url 'upload_file' %}",
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    headers: {
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    xhr: function() {
                        var xhr = new window.XMLHttpRequest();
                        xhr.upload.addEventListener("progress", function(evt) {
                            if (evt.lengthComputable) {
                                var percentComplete = Math.round((evt.loaded / evt.total) * 100);
                                progressBar.style.width = percentComplete + '%';
                                progressBar.setAttribute('aria-valuenow', percentComplete);
                                progressBar.innerText = percentComplete + '%';
                            }
                        }, false);
                        return xhr;
                    },
                    success: function (response) {
                        if (response.status === 'success') {
                            progressBar.style.width = '100%';
                            progressBar.setAttribute('aria-valuenow', '100');
                            progressBar.innerText = '100%';
                            document.getElementById('saved').style.display="block";
                            document.getElementById('error').style.display="none";
                        }
                    },
                    error: function (xhr, status, error) {
                        document.getElementById('error').style.display="block";
                        document.getElementById('saved').style.display="none";
                    }
                });
            }
        </script>



        <!-- Javascript -->
        <script src="/static/assets/bundles/libscripts.bundle.js"></script>
        <script src="/static/assets/bundles/vendorscripts.bundle.js"></script>

        <script src="/static/assets/vendor/dropify/js/dropify.min.js"></script>

        <!-- page js file -->
        <script src="/static/assets/bundles/mainscripts.bundle.js"></script>
        <script src="../js/pages/forms/dropify.js"></script>
        <script>
            $(function () {
                $('.dropify').dropify();

                var drEvent = $('#dropify-event').dropify();
                drEvent.on('dropify.beforeClear', function (event, element) {
                    return confirm("Do you really want to delete \"" + element.file.name + "\" ?");
                });

                drEvent.on('dropify.afterClear', function (event, element) {
                    alert('File deleted');
                });

                $('.dropify-fr').dropify({
                    messages: {
                        default: 'Glissez-dÃ©posez un fichier ici ou cliquez',
                        replace: 'Glissez-dÃ©posez un fichier ou cliquez pour remplacer',
                        remove: 'Supprimer',
                        error: 'DÃ©solÃ©, le fichier trop volumineux'
                    }
                });
            });
        </script>
</body>

</html>
