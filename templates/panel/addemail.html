<!doctype html>
<html lang="en">

<head>
    <title>:: VoidPanel :: Add EMail</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="VoidPanel Emails ">
    <meta name="author" content="Voidpanel, design by: Voidpanel.com">
    <link rel="icon" href="/static/icons/fav.png" type="image/x-icon">

    <!-- VENDOR CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/toastr/toastr.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/charts-c3/plugin.css" />

    <!-- MAIN Project CSS file -->
    <link rel="stylesheet" href="/static/assets/css/main.css">

    <link rel="stylesheet" href="/static/assets/vendor/jvectormap/jquery-jvectormap-2.0.3.min.css" />
</head>

<body  data-theme="light" class="font-nunito">

    <div id="wrapper" class="theme-cyan">

        <!-- Page Loader -->
        <div class="page-loader-wrapper">
            <div class="loader">
                <div class="m-t-30"><img src="/static/icons/fav.png" width="48" height="48" alt="VoidPanel">
                </div>
                <p>Please wait...</p>
            </div>
        </div>



        {% include 'navbar.html' %}

        <!-- main left menu -->
        {% include 'left.html' %}
        <!-- rightbar icon div -->
        {% include 'right.html' %}


        <!-- mani page content body part -->

        <div id="main-content">

            <div class="container-fluid">
                <div class="block-header">
                    <div class="row">
                        <div class="col-lg-6 col-md-6 col-sm-12">
                            <h2>Add Email</h2>
                            <ul class="breadcrumb">
                                <li class="breadcrumb-item"><a href="/"><i class="fa fa-dashboard"></i></a>
                                </li>
                                <li class="breadcrumb-item">Dashboard</li>
                                <li class="breadcrumb-item">Add Email</li>

                            </ul>
                        </div>


                    </div>
                </div>


                <div id="addpermission" style="display: block; margin-top: 190px;">
                    <div class="modal-dialog modal-sm" role="document">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h6 class="title" id="defaultModalLabel">Add Email</h6>
                            </div>
                            <form id="myForm" method="post" action="">{% csrf_token %}
                                <div class="modal-body">
                                    <div class="row clearfix">
                                        <div class="col-md-12 col-sm-12">
                                            <div class="form-group">
                                                <input type="text" name="email" id="myInput" class="form-control"
                                                    placeholder="info@example.com" required>
                                            </div>
                                            <div class="form-group">
                                                <input type="password" name="password" id="myInput2" class="form-control"
                                                    placeholder="example@example.com" required>
                                            </div>

                                            <div class="form-group">
                                                <input type="password" name="password2" id="myInput3" class="form-control"
                                                    placeholder="example@example.com" required>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div id="progress" style="display: none;">
                                    <div class="progress">
                                        <div id="pbar" class="progress-bar progress-bar-success progress-bar-striped active"
                                            role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                                            style="width: 0%">
            
                                        </div>
            
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button id="addwebsite" type="submit" style="display: block;"
                                        class="btn btn-primary">Add Email</button>
                                        
                                        
                                </div>
                                
                                
                            </form>
                            
                        </div>
                    </div>
                </div>



            </div>
        </div>


        <!-- Modal for add user -->


        <script>

            document.getElementById('myForm').addEventListener('submit', function (event) {
                // Prevent the default form submission
                event.preventDefault();
                var xx=document.getElementById("addwebsite");
                xx.style.display="none";
                let width = 0;
                    const progressBar = document.getElementById('pbar');
                    const progressContainer = document.getElementById('progress');
                    progressContainer.style.display = 'block';  // Show progress bar
                    function updateProgress() {
                        if (width < 80) {
                            width++; 
                            width++; 
                            width++; 
                    
                            progressBar.style.width = width + '%';  // Update visual width
                            progressBar.setAttribute('aria-valuenow', width);  // Update ARIA value
                            setTimeout(updateProgress, 1000);  // Call again in 2 seconds
                        }
                    }
                    updateProgress();
                // Capture the values from the input fields
                var website = document.getElementById('myInput').value;
                var email = document.getElementById('myInput2').value;

                // Create the data object to send
                var data = {
                    'web': website,
                    'email': email
                };

                // Send the data using fetch
                fetch("{% url 'addweb' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}' // Include the CSRF token for security
                    },
                    body: JSON.stringify(data) // Convert the data to a JSON string
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            progressBar.style.width = 100 + '%';  // Update visual width
                            progressBar.setAttribute('aria-valuenow', 100); 
                            alert('Domain  have been successfully submitted!');
                            // Optionally reset the form
                            document.getElementById('myForm').reset();
                            xx.style.display="block";
                           

                        } 
                        
                    else if (data.status === 'already') {
                            alert('Domain Already Exist');
                            xx.style.display="block";
                            progressContainer.style.display = 'none'; 
                            progressContainer.style.display = 'none'; 
                            window.location.href = "/viewwebsite";
                        }
                        
                        else if (data.status === 'error') {
                            alert('There was an error submitting your data. Please try again.');
                            xx.style.display="block";
                            progressContainer.style.display = 'none'; 
                        } else {
                            alert('Unexpected response from the server.');
                            xx.style.display="block";
                            progressContainer.style.display = 'none'; 
                        }
                    })
                    .catch(error => {
                        progressBar.style.width = 100 + '%';  // Update visual width
                            progressBar.setAttribute('aria-valuenow', 100); 
                            alert('Domain  have been successfully submitted!');
                            // Optionally reset the form
                            document.getElementById('myForm').reset();
                            xx.style.display="block";
                    });
            });


        </script>


        <!-- Javascript -->
        <script src="/static/assets/bundles/libscripts.bundle.js"></script>
        <script src="/static/assets/bundles/vendorscripts.bundle.js"></script>

        <!-- page vendor js file -->
        <script src="/static/assets/vendor/toastr/toastr.js"></script>
        <script src="/static/assets/bundles/c3.bundle.js"></script>


        <script src="/static/assets/bundles/jvectormap.bundle.js"></script> <!-- JVectorMap Plugin Js -->
        <script src="/static/assets/bundles/knob.bundle.js"></script> <!-- Jquery Knob-->


        <!-- page js file -->
        <script src="/static/assets/bundles/mainscripts.bundle.js"></script>
        <script src="/static/assets/bundles/chartjs.js"></script>
        <script src="/static/assets/index2.js"></script>


</body>

</html>
