    <style>
        /* Basic styling for the p tag */
        p.processing {
            font-size: 18px;
            font-weight: bold;

        }

        /* Animation for the dots */
        .dots::after {
            content: '';
            display: inline-block;
            width: 1em;
            text-align: left;
            animation: dots 1.5s steps(4, end) infinite;
        }

        /* Keyframes for the dots animation */
        @keyframes dots {

            0%,
            100% {
                content: '';
            }

            25% {
                content: '.';
            }

            50% {
                content: '..';
            }

            75% {

            }
        }
    </style>

    <script>
        function closeelol(){
            document.getElementById('eeee').style.display='none';
        }
    </script>

    <script>
        
         async function install(event) {
                // Prevent the default action (e.g., form submission)
                if (event) {
                    event.preventDefault();
                }
                
                document.getElementById('pro').style.display='block';
                const form = document.getElementById('adddbform');
                const formData = new FormData(form);



                try {
                    // Fetch request to submit form data
                    const response = await fetch('/cwtd/', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value  // CSRF token for Django
                        }
                    });

                    // Parse the JSON response
                    const result = await response.json();


                    // Handle response
                    if (response.ok && result.status === 'success') {
                        document.getElementById('pro').style.display='none';
                
                        document.getElementById('eeee').style.display = "block";
                        document.getElementById('statusemail').innerHTML = "User Created";
                        window.location.reload();
                        
                    } else {
                        document.getElementById('pro').style.display='nonw';
               
                        document.getElementById('eeee').style.display = "block";
                        document.getElementById('statusemail').innerHTML = "User Created";
                        window.location.reload();

                       
                    }
                } catch (error) {
                    document.getElementById('pro').style.display='none';
         
                    document.getElementById('eeee').style.display = "block";
                    document.getElementById('statusemail').innerHTML = "User Created";
                    window.location.reload();

                  
                }
            }


          
    </script>
