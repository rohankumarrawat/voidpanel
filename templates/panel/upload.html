<!doctype html>
<html lang="en">

<head>
    <title>:: VoidPanel :: Upload</title>


    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- VENDOR CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/font-awesome/css/font-awesome.min.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="/static/assets/vendor/dropify/css/dropify.min.css">

    <!-- MAIN CSS -->
    <link rel="stylesheet" href="/static/assets/css/main.css?v=2">

</head>

<body data-theme="light" class="font-nunito">

    <div id="wrapper" class="theme-cyan">

        <!-- Page Loader -->
        <div class="page-loader-wrapper">
            <div class="loader">
                <div class="m-t-30"><img src="/static/icons/fav.png" width="48" height="48" alt="VoidPanel">
                </div>
                <p>Please wait...</p>
            </div>
        </div>

        <!-- Top navbar div start -->

        <!-- main left menu -->




        <!-- mani page content body part -->



        <form id="uploadForm" enctype="multipart/form-data">
            <div id="saved" class="alert alert-success" style="display: none;">
                <strong>Success!</strong> Uploaded Successfully
              </div>
              <div id="error" class="alert alert-danger" style="display: none;">
                <strong>Danger!</strong> Cannot Upload File.
              </div>

            <div class="col-lg-6 col-md-12" style="margin-top: 250px; margin-left: 350px;">
                <div class="card">
                    <div class="header">
                        <h2>Location <small>{{location}}</small></h2>
                    </div>

                    <div class="body">
                        <input type="file" id="file" name="file" class="dropify" required multiple>
                        <input type="text" id="file_path" name="file_path" hidden value="{{location}}">

                    </div>
                    <center><button id="myButton" type="button" class="btn btn-success"
                            onclick="uploadFile()">Upload</button>
                    </center>
                    <br>
                    <div id="progress" style="display: none;">
                        <div class="progress">
                            <div id="pbar" class="progress-bar progress-bar-success progress-bar-striped active"
                                role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                                style="width: 0%">

                            </div>

                        </div>
                    </div>
                    <br>
                </div>


            </div>

        </form>




        <script>

            function uploadFile() {
                var myList = {{ data| safe}};
                var formData = new FormData();
                var fileInput = $('#file')[0];
                var filePath = $('#file_path').val();
                
                if (fileInput.files.length === 0) {
                    alert('Please select files first.');
                    return;
                }
                
                formData.append('file_path', filePath);
                
                let conflict = false;
                for(let i=0; i<fileInput.files.length; i++) {
                    let f = fileInput.files[i];
                    formData.append('file', f);
                    if (myList.includes(f.name)) {
                        conflict = true;
                    }
                }
                
                if (conflict) {
                    if (!confirm("One or more files already exist in this folder! Do you want to Overwrite them?")) {
                        return;
                    }
                }

                let width = 0;
                const progressBar = document.getElementById('pbar');
                const progressContainer = document.getElementById('progress');
                document.getElementById('error').style.display="none";
                document.getElementById('saved').style.display="none";
                progressContainer.style.display = 'block';  

                function updateProgress() {
                    if (width < 80) {
                        width++;  
                        progressBar.style.width = width + '%';  
                        progressBar.setAttribute('aria-valuenow', width); 
                        setTimeout(updateProgress, 2000); 
                    }
                }
                updateProgress();

                $.ajax({
                    url: "{% url 'upload_file' %}",  
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    headers: {
                        'X-CSRFToken': '{{ csrf_token }}'  
                    },
                    success: function (response) {
                        if (response.status === 'success') {
                            width = 100;
                            progressBar.style.width = width + '%';  
                            progressBar.setAttribute('aria-valuenow', width);
                            document.getElementById('saved').style.display="block";
                            document.getElementById('saved').innerHTML = "<strong>Success!</strong> " + response.message;
                            
                            // Reset dropify UI
                            if($('.dropify-clear').length) {
                                $('.dropify-clear').trigger('click');
                            }
                        } else {
                            document.getElementById('error').style.display="block";
                            document.getElementById('error').innerHTML = "<strong>Error!</strong> " + response.message;
                        }
                    },
                    error: function (xhr, status, error) {
                        document.getElementById('error').style.display="block";
                        document.getElementById('error').innerHTML = "<strong>Error!</strong> Upload request failed.";
                    }
                });
            }
        </script>



        <!-- Javascript -->
        <script src="/static/assets/bundles/libscripts.bundle.js"></script>
        <script src="/static/assets/bundles/vendorscripts.bundle.js"></script>

        <script src="/static/assets/vendor/dropify/js/dropify.min.js"></script>

        <!-- page js file -->
        <script src="/static/assets/bundles/mainscripts.bundle.js"></script>
        <script src="../js/pages/forms/dropify.js"></script>
        <script>
            $(function () {
                $('.dropify').dropify();

                var drEvent = $('#dropify-event').dropify();
                drEvent.on('dropify.beforeClear', function (event, element) {
                    return confirm("Do you really want to delete \"" + element.file.name + "\" ?");
                });

                drEvent.on('dropify.afterClear', function (event, element) {
                    alert('File deleted');
                });

                $('.dropify-fr').dropify({
                    messages: {
                        default: 'Glissez-dÃ©posez un fichier ici ou cliquez',
                        replace: 'Glissez-dÃ©posez un fichier ou cliquez pour remplacer',
                        remove: 'Supprimer',
                        error: 'DÃ©solÃ©, le fichier trop volumineux'
                    }
                });
            });
        </script>
</body>

</html>
