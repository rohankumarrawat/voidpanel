{% load static %}
<!doctype html>
<html lang="en">
<head>
    <title>Support — VoidPanel</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="/static/fav.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/assets/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/assets/css/main.css?v=3">
    <!-- ★ Theme init ★ -->
    <script>(function(){localStorage.setItem('vp-theme','dark');var t='dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
        :root {
            --bg: #07091a; --card: rgba(13,17,38,0.95);
            --border-s: rgba(255,255,255,0.07); --accent: #6366f1; --cyan: #22d3ee;
            --green: #10b981; --red: #ef4444; --amber: #f59e0b;
            --text-1: #f1f5f9; --text-2: #94a3b8; --radius: 14px;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif !important; background: var(--bg); }
        /* Let main.css/bootstrap handle main-content layout */

        .sp-root { padding: 28px 28px 60px; max-width: 1050px; }

        /* Header */
        .sp-hero {
            background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(34,211,238,0.05));
            border: 1px solid rgba(99,102,241,0.2); border-radius: 20px;
            padding: 28px 32px; margin-bottom: 24px;
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
        }
        .sp-hero-left { display: flex; align-items: center; gap: 18px; }
        .sp-hero-icon {
            width: 52px; height: 52px; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: #fff; flex-shrink: 0;
        }
        .sp-hero h1 { font-size: 1.3rem; font-weight: 800; color: var(--text-1); margin: 0; }
        .sp-hero p  { font-size: 0.82rem; color: var(--text-2); margin: 4px 0 0; }

        /* Tabs */
        .sp-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .sp-tab {
            padding: 9px 20px; border-radius: 10px; border: 1px solid var(--border-s);
            background: rgba(255,255,255,0.03); color: var(--text-2);
            font-size: 0.83rem; font-weight: 600; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 7px;
        }
        .sp-tab:hover { background: rgba(255,255,255,0.06); color: var(--text-1); }
        .sp-tab.active { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.35); color: #a5b4fc; }

        /* Panels */
        .sp-panel { display: none; }
        .sp-panel.active { display: block; }

        /* Form */
        .sp-card {
            background: var(--card); border: 1px solid var(--border-s);
            border-radius: var(--radius); padding: 28px;
        }
        .sp-card h2 { font-size: 1rem; font-weight: 800; color: var(--text-1); margin: 0 0 22px; display: flex; align-items: center; gap: 10px; }
        .sp-label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
        .sp-input {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 11px 14px; border-radius: 10px;
            font-family: 'Inter',sans-serif; font-size: 0.9rem; outline: none; transition: 0.2s;
        }
        .sp-input:focus { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .sp-input::placeholder { color: var(--text-2); }
        select.sp-input {
            appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 14px center; background-size: 16px;
            padding-right: 40px; cursor: pointer;
        }
        select.sp-input option { background: #0d1126; }

        /* Priority selector */
        .priority-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .priority-btn {
            flex: 1; min-width: 80px; padding: 10px 6px; border-radius: 10px;
            border: 1px solid var(--border-s); background: rgba(255,255,255,0.03);
            color: var(--text-2); font-size: 0.8rem; font-weight: 700;
            cursor: pointer; transition: 0.15s; text-align: center;
        }
        .priority-btn:hover { background: rgba(255,255,255,0.06); }
        .priority-btn.sel-low    { border-color: #10b981; background: rgba(16,185,129,0.12); color: #10b981; }
        .priority-btn.sel-medium { border-color: #6366f1; background: rgba(99,102,241,0.12); color: #a5b4fc; }
        .priority-btn.sel-high   { border-color: #f59e0b; background: rgba(245,158,11,0.12); color: #fbbf24; }
        .priority-btn.sel-urgent { border-color: #ef4444; background: rgba(239,68,68,0.12);  color: #f87171; }

        /* Submit btn */
        .sp-submit {
            margin-top: 20px; padding: 12px 28px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            color: #fff; font-weight: 700; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .sp-submit:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,102,241,0.35); }
        .sp-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Toast */
        .sp-toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--card); border: 1px solid var(--border-s); border-radius: 12px;
            padding: 12px 24px; color: var(--text-1); font-weight: 600; font-size: 0.88rem;
            display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); z-index: 9000; pointer-events: none;
        }
        .sp-toast.show { transform: translateX(-50%) translateY(0); }
        .sp-toast.ok  i { color: var(--green); }
        .sp-toast.err i { color: var(--red); }

        /* Ticket list */
        .ticket-list { display: flex; flex-direction: column; gap: 10px; }
        .ticket-row {
            background: var(--card); border: 1px solid var(--border-s); border-radius: 12px;
            padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.15s; gap: 16px;
        }
        .ticket-row:hover { border-color: rgba(99,102,241,0.3); background: rgba(13,17,38,1); }
        .ticket-tid { font-family: monospace; font-size: 0.8rem; color: var(--cyan); background: rgba(34,211,238,0.08); padding: 2px 8px; border-radius: 6px; flex-shrink: 0; }
        .ticket-subj { font-weight: 700; color: var(--text-1); font-size: 0.92rem; }
        .ticket-meta { font-size: 0.75rem; color: var(--text-2); margin-top: 3px; }
        .ticket-badges { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

        .badge {
            padding: 3px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 700;
            border: 1px solid transparent;
        }
        .badge-open      { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.25); color: #a5b4fc; }
        .badge-in_progress { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.25); color: #fbbf24; }
        .badge-resolved  { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.25); color: #34d399; }
        .badge-closed    { background: rgba(255,255,255,0.05); border-color: var(--border-s); color: var(--text-2); }

        /* Detail view */
        .sp-back { background: none; border: none; color: var(--cyan); font-size: 0.83rem; font-weight: 700; cursor: pointer; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; padding: 0; }
        .sp-back:hover { color: #fff; }
        .reply-bubble {
            padding: 12px 16px; border-radius: 12px; max-width: 80%; font-size: 0.88rem; line-height: 1.5;
            margin-bottom: 10px;
        }
        .reply-bubble.user  { align-self: flex-end; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.25); color: #e0e7ff; }
        .reply-bubble.staff { align-self: flex-start; background: rgba(255,255,255,0.04); border: 1px solid var(--border-s); color: var(--text-1); }
        .reply-container { display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto; margin: 16px 0; }
        .reply-author { font-size: 0.72rem; color: var(--text-2); margin-bottom: 3px; }
        .sp-empty { text-align: center; padding: 48px; color: var(--text-2); font-size: 0.88rem; }
    </style>
</head>

<body class="font-nunito active-dark-mode">
<div id="wrapper" class="theme-cyan">

    {% include 'navbar.html' %}
    {% include 'left.html' %}
    {% include 'right.html' %}

    <div id="main-content">
    <div class="container-fluid">
    <div class="sp-root">

        <!-- Hero -->
        <div class="sp-hero">
            <div class="sp-hero-left">
                <div class="sp-hero-icon"><i class="fa-solid fa-headset"></i></div>
                <div>
                    <h1>Support Center</h1>
                    <p>Submit and track support tickets — all handled locally.</p>
                </div>
            </div>
            <div id="ticketCount" style="font-size:0.82rem;color:var(--text-2);"></div>
        </div>

        <!-- Tabs -->
        <div class="sp-tabs">
            <button class="sp-tab active" onclick="showPanel('create')" id="tab-create">
                <i class="fa-solid fa-plus"></i> New Ticket
            </button>
            <button class="sp-tab" onclick="showPanel('list')" id="tab-list">
                <i class="fa-solid fa-list"></i> My Tickets
            </button>
        </div>

        <!-- Create Panel -->
        <div class="sp-panel active" id="panel-create">
            <div class="sp-card">
                <h2><i class="fa-solid fa-ticket" style="color:var(--cyan);"></i> Generate a Support Ticket</h2>

                <div style="margin-bottom:18px;">
                    <label class="sp-label">Subject *</label>
                    <input type="text" id="spSubject" class="sp-input" placeholder="Briefly describe your issue">
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;">
                    <div>
                        <label class="sp-label">Department</label>
                        <select id="spDept" class="sp-input">
                            <option>Technical Support</option>
                            <option>Billing</option>
                            <option>Sales</option>
                            <option>Abuse</option>
                        </select>
                    </div>
                    <div>
                        <label class="sp-label">Priority</label>
                        <div class="priority-row" id="priorityRow">
                            <button class="priority-btn" data-p="low"    onclick="setPriority('low')"><i class="fa-solid fa-arrow-down"></i> Low</button>
                            <button class="priority-btn sel-medium" data-p="medium" onclick="setPriority('medium')"><i class="fa-solid fa-minus"></i> Medium</button>
                            <button class="priority-btn" data-p="high"   onclick="setPriority('high')"><i class="fa-solid fa-arrow-up"></i> High</button>
                            <button class="priority-btn" data-p="urgent" onclick="setPriority('urgent')"><i class="fa-solid fa-fire"></i> Urgent</button>
                        </div>
                    </div>
                </div>

                <div style="margin-bottom:6px;">
                    <label class="sp-label">Message *</label>
                    <textarea id="spMessage" class="sp-input" rows="6" placeholder="Describe your issue in detail, including any error messages or steps to reproduce."></textarea>
                </div>

                <button class="sp-submit" id="spSubmitBtn" onclick="submitTicket()">
                    <i class="fa-solid fa-paper-plane"></i> Submit Ticket
                </button>
            </div>
        </div>

        <!-- List Panel -->
        <div class="sp-panel" id="panel-list">
            <div id="ticketListContainer">
                <div class="sp-card" style="text-align:center;padding:40px;">
                    <i class="fa-solid fa-circle-notch fa-spin" style="color:var(--accent);font-size:1.5rem;"></i>
                    <p style="color:var(--text-2);margin-top:12px;">Loading tickets…</p>
                </div>
            </div>
        </div>

        <!-- Detail Panel -->
        <div class="sp-panel" id="panel-detail">
            <div id="ticketDetailContainer"></div>
        </div>

    </div>
    </div>
    </div>
    </div>
</div>

<!-- Toast -->
<div class="sp-toast" id="spToast"><i class="fa-solid fa-circle-check"></i> <span id="spToastMsg"></span></div>


<script>
/* Hide page loader */
(function(){
    function hide(){ var e=document.querySelector('.page-loader-wrapper'); if(e) e.style.display='none'; }
    if(document.readyState==='complete') hide();
    else window.addEventListener('load', hide);
    setTimeout(hide, 800);
})();

let selectedPriority = 'medium';

// ── Tabs ──────────────────────────────────────────────────────────────────
function showPanel(name) {
    document.querySelectorAll('.sp-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sp-tab').forEach(t => t.classList.remove('active'));
    var panel = document.getElementById('panel-' + name);
    if (panel) panel.classList.add('active');
    var tab = document.getElementById('tab-' + name);
    if (tab) tab.classList.add('active');
    if (name === 'list') loadTickets();
}

// ── Priority ──────────────────────────────────────────────────────────────
function setPriority(p) {
    selectedPriority = p;
    document.querySelectorAll('.priority-btn').forEach(btn => {
        btn.className = 'priority-btn';
        if (btn.dataset.p === p) btn.classList.add('sel-' + p);
    });
}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, ok=true) {
    const t = document.getElementById('spToast');
    const i = t.querySelector('i');
    document.getElementById('spToastMsg').textContent = msg;
    i.className = ok ? 'fa-solid fa-circle-check' : 'fa-solid fa-triangle-exclamation';
    t.className = 'sp-toast show ' + (ok ? 'ok' : 'err');
    setTimeout(() => t.className = 'sp-toast', 3500);
}

// ── CSRF helper ───────────────────────────────────────────────────────────
function csrf() {
    return (document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('csrftoken='))||'').split('=')[1]||'';
}

// ── Submit Ticket ─────────────────────────────────────────────────────────
async function submitTicket() {
    const subject = document.getElementById('spSubject').value.trim();
    const message = document.getElementById('spMessage').value.trim();
    const dept    = document.getElementById('spDept').value;
    if (!subject) { document.getElementById('spSubject').focus(); return toast('Please enter a subject.', false); }
    if (!message) { document.getElementById('spMessage').focus(); return toast('Please enter a message.', false); }

    const btn = document.getElementById('spSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting…';

    try {
        const res = await fetch('/api/tickets/create/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
            body: JSON.stringify({ subject, message, department: dept, priority: selectedPriority })
        });
        const d = await res.json();
        if (d.status === 'success') {
            toast(`Ticket ${d.ticket_id} created successfully!`);
            document.getElementById('spSubject').value = '';
            document.getElementById('spMessage').value = '';
            setPriority('medium');
            setTimeout(() => showPanel('list'), 800);
        } else {
            toast(d.message || 'Failed to create ticket.', false);
        }
    } catch(e) {
        toast('Network error: ' + e, false);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Ticket';
    }
}

// ── Load Tickets ──────────────────────────────────────────────────────────
async function loadTickets() {
    try {
        const res = await fetch('/api/tickets/list/');
        const d = await res.json();
        const c = document.getElementById('ticketListContainer');
        if (!d.tickets || d.tickets.length === 0) {
            c.innerHTML = `<div class="sp-card sp-empty"><i class="fa-solid fa-inbox" style="font-size:2.5rem;display:block;margin-bottom:14px;opacity:0.3;"></i>No tickets yet. Create one from "New Ticket".</div>`;
            document.getElementById('ticketCount').textContent = '';
            return;
        }
        document.getElementById('ticketCount').textContent = d.tickets.length + ' ticket' + (d.tickets.length===1?'':'s');
        const statusBadge = s => `<span class="badge badge-${s}">${s.replace('_',' ')}</span>`;
        const priColor = {low:'#10b981',medium:'#6366f1',high:'#f59e0b',urgent:'#ef4444'};
        c.innerHTML = `<div class="ticket-list">` + d.tickets.map(t => `
            <div class="ticket-row" onclick="openTicket('${t.ticket_id}')">
                <div>
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px;">
                        <span class="ticket-tid">${t.ticket_id}</span>
                        <span class="ticket-subj">${t.subject}</span>
                    </div>
                    <div class="ticket-meta">${t.department} &bull; ${t.created_at}</div>
                </div>
                <div class="ticket-badges">
                    <span style="font-size:0.75rem;font-weight:700;color:${priColor[t.priority]||'#fff'}">${t.priority.toUpperCase()}</span>
                    ${statusBadge(t.status)}
                    <i class="fa-solid fa-chevron-right" style="color:var(--text-2);font-size:0.8rem;"></i>
                </div>
            </div>`).join('') + `</div>`;
    } catch(e) {
        document.getElementById('ticketListContainer').innerHTML = `<div class="sp-card sp-empty">Could not load tickets.</div>`;
    }
}

// ── Open Ticket ───────────────────────────────────────────────────────────
async function openTicket(tid) {
    showPanel('detail');
    const c = document.getElementById('ticketDetailContainer');
    c.innerHTML = `<div class="sp-card" style="text-align:center;padding:40px;"><i class="fa-solid fa-circle-notch fa-spin" style="color:var(--accent);font-size:1.5rem;"></i></div>`;
    try {
        const res = await fetch(`/api/tickets/${tid}/`);
        const d = await res.json();
        if (d.status !== 'success') throw new Error('Not found');
        const t = d.ticket;
        const priColor = {low:'#10b981',medium:'#6366f1',high:'#f59e0b',urgent:'#ef4444'};
        const replies = (d.replies || []).map(r => `
            <div style="align-self:${r.is_staff?'flex-start':'flex-end'}">
                <div class="reply-author" style="text-align:${r.is_staff?'left':'right'}">${r.author} &bull; ${r.created_at}</div>
                <div class="reply-bubble ${r.is_staff?'staff':'user'}">${r.message}</div>
            </div>`).join('');

        c.innerHTML = `
            <button class="sp-back" onclick="showPanel('list')"><i class="fa-solid fa-arrow-left"></i> Back to Tickets</button>
            <div class="sp-card">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
                    <div>
                        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                            <span class="ticket-tid">${t.ticket_id}</span>
                            <h2 style="margin:0;font-size:1rem;font-weight:800;color:var(--text-1);">${t.subject}</h2>
                        </div>
                        <div style="font-size:0.78rem;color:var(--text-2);">${t.department} &bull; Created ${t.created_at} by ${t.created_by}</div>
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <span style="font-weight:700;font-size:0.75rem;color:${priColor[t.priority]||'#fff'}">${t.priority.toUpperCase()}</span>
                        <span class="badge badge-${t.status}">${t.status.replace('_',' ')}</span>
                    </div>
                </div>

                <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border-s);border-radius:10px;padding:16px;font-size:0.9rem;color:var(--text-1);line-height:1.6;margin-bottom:16px;white-space:pre-wrap;">${t.message}</div>

                ${d.replies && d.replies.length > 0 ? `
                <div class="reply-container">${replies}</div>
                ` : `<div style="color:var(--text-2);font-size:0.82rem;margin-bottom:16px;"><i class="fa-regular fa-comment-dots"></i> No replies yet.</div>`}

                <label class="sp-label" style="margin-top:12px;">Add Reply</label>
                <textarea id="replyMsg_${t.ticket_id}" class="sp-input" rows="3" placeholder="Type your reply…"></textarea>
                <button class="sp-submit" style="margin-top:12px;" onclick="sendReply('${t.ticket_id}')">
                    <i class="fa-solid fa-reply"></i> Send Reply
                </button>
            </div>
        </div>`;
    } catch(e) {
        console.error(e);
        c.innerHTML = `<div class="sp-card sp-empty" style="color: red;">Error: ${e.message}</div>`;
    }
}

// ── Send Reply ────────────────────────────────────────────────────────────
async function sendReply(tid) {
    const msg = document.getElementById('replyMsg_' + tid).value.trim();
    if (!msg) return toast('Enter a message.', false);
    try {
        const res = await fetch(`/api/tickets/${tid}/reply/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
            body: JSON.stringify({ message: msg })
        });
        const d = await res.json();
        if (d.status === 'success') { toast('Reply sent!'); openTicket(tid); }
        else toast(d.message||'Failed.', false);
    } catch(e) { toast('Network error.', false); }
}
</script>

    <script src="/static/assets/bundles/libscripts.bundle.js"></script>
    <script src="/static/assets/bundles/vendorscripts.bundle.js"></script>
    <script src="/static/assets/bundles/mainscripts.bundle.js"></script>

</body>
</html>
