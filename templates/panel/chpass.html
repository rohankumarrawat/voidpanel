<head>
    <title>:: VoidPanel :: ChangePassword</title>
    <meta charset="utf-8">

    <!-- VENDOR CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/toastr/toastr.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/charts-c3/plugin.css" />

    <!-- MAIN Project CSS file -->
    <link rel="stylesheet" href="/static/assets/css/main.css">

    <link rel="stylesheet" href="/static/assets/vendor/jvectormap/jquery-jvectormap-2.0.3.min.css" />
</head>

<body  data-theme="light" class="font-nunito">

    <div id="wrapper" class="theme-cyan">

        <!-- Page Loader -->
        <div class="page-loader-wrapper">
            <div class="loader">
                <div class="m-t-30"><img src="/static/icons/fav.png" width="48" height="48" alt="VoidPanel">
                </div>
                <p>Please wait...</p>
            </div>
        </div>



        {% include 'navbar.html' %}

        <!-- main left menu -->
        {% include 'left.html' %}
        <!-- rightbar icon div -->
        {% include 'right.html' %}


        <!-- mani page content body part -->

        <div id="main-content">

            <div class="container-fluid">
                <div class="block-header">
                    <div class="row">
                        <div class="col-lg-6 col-md-6 col-sm-12">
                            <h2>Add Website</h2>
                            <ul class="breadcrumb">
                                <li class="breadcrumb-item"><a href="/"><i class="fa fa-dashboard"></i></a>
                                </li>
                                <li class="breadcrumb-item">Dashboard</li>
                                <li class="breadcrumb-item">Change Password</li>

                            </ul>
                        </div>


                    </div>
                </div>


                <div id="addpermission" style="display: block; margin-top: 190px;">
                    <div class="modal-dialog modal-sm" role="document">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h6 class="title" id="defaultModalLabel"> Change Password</h6>
                            </div>
                            <form id="myForm" method="post" action="">{% csrf_token %}
                                <div class="modal-body">
                                    <div class="row clearfix">
                                        <div class="col-md-12 col-sm-12">
                                            <div class="form-group">
                                                <input required type="password" name="password" placeholder="Password"
                                                    id="password" class="form-control">


                                            </div>
                                            <div id="match" class="form-group">


                                            </div>
                                            <div class="form-group">
                                                <input required type="password" oninput="confirm(this);"
                                                    name="password1" placeholder="Confirm Password" id="password1"
                                                    class="form-control">

                                            </div>
                                            <div class="row clearfix">
                                                <div class="col-md-8 col-sm-12">
                                                    <div class="form-group">
                                                        <button type="button" class="btn btn-secondary"
                                                            onclick="gen();">Generate Password</button>
                                                    </div>
                                                </div>
                                                <div class="col-md-4 col-sm-12">
                                                    <div class="form-group">
                                                        <button type="button" class="btn btn-primary"
                                                            onclick="genshow();"><i class="fa  icon-eye"> </i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                              
                                <div class="modal-footer">
                                    <button id="addwebsite" type="submit" style="display: block;"
                                        class="btn btn-primary" disabled>Change Password</button>
                                        
                                        
                                </div>
                                
                                
                            </form>
                            
                        </div>
                    </div>
                </div>



            </div>
        </div>


        <!-- Modal for add user -->
<script>

function confirm(input) {
                const password = document.getElementById('password').value;
                const password1 = document.getElementById('password1').value;
                const pri = document.getElementById('match');
                if (password === password1) {
                    pri.innerHTML = "Password Matched !";
                    document.getElementById('addwebsite').disabled = false;
                } else {
                    pri.innerHTML = 'Passwords do not match!';
                    document.getElementById('addwebsite').disabled = true;
                }


            }
    function gen() {
                // Define characters to include in the password
                const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~";

                let password = "";

                // Loop to generate 8 characters randomly
                for (let i = 0; i < 10; i++) {
                    const randomIndex = Math.floor(Math.random() * chars.length);
                    password += chars[randomIndex];
                }
                

                passw = document.getElementById('password');
                passw1 = document.getElementById('password1');
                passw.value = password;
                passw1.value = password;
                passw.placeholder = password;
                passw1.placeholder = password;
  
                document.getElementById('addwebsite').disabled = false;
            }

            function genshow(input) {
                const password = document.getElementById('password');
                const password1 = document.getElementById('password1');
                if (password.type === "password") {
                    password.type = "text";
                    password1.type = "text";
                } else {
                    password.type = "password";
                    password1.type = "password";
                }
            }
</script>

  



        <!-- Javascript -->
        <script src="/static/assets/bundles/libscripts.bundle.js"></script>

        <script src="/static/assets/vendor/toastr/toastr.js"></script>

        <script src="/static/assets/bundles/knob.bundle.js"></script> <!-- Jquery Knob-->


        <!-- page js file -->
        <script src="/static/assets/bundles/mainscripts.bundle.js"></script>
        <script src="/static/assets/bundles/chartjs.js"></script>
        <script src="/static/assets/index2.js"></script>


</body>

</html>
