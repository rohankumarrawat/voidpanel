<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidPanel IDE — {{ root_name }}</title>
    <link rel="icon" href="/static/icons/fav.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-base:        #1e1e1e;
            --bg-sidebar:     #252526;
            --bg-sidebar-hd:  #2c2c2d;
            --bg-tab-bar:     #2d2d2d;
            --bg-tab:         #2d2d2d;
            --bg-tab-act:     #1e1e1e;
            --bg-editor:      #1e1e1e;
            --bg-activity:    #333333;
            --bg-statusbar:   #007acc;
            --bg-panel:       #1e1e1e;
            --accent:         #007acc;
            --accent-2:       #4fc1ff;
            --green:          #4ec9b0;
            --red:            #f44747;
            --yellow:         #cca700;
            --orange:         #ce9178;
            --purple:         #c586c0;
            --text-dim:       #555;
            --text-mid:       #858585;
            --text-main:      #cccccc;
            --text-bright:    #d4d4d4;
            --text-highlight: #ffffff;
            --border:         rgba(255,255,255,0.07);
            --border-hover:   rgba(255,255,255,0.12);
            --radius:         3px;
            --sidebar-width:  260px;
            --activity-width: 48px;
            --tab-height:     35px;
            --statusbar-h:    22px;
            --titlebar-h:     30px;
            --font-ui:        'Inter', sans-serif;
            --font-mono:      'JetBrains Mono', 'Fira Code', Consolas, monospace;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            font-size: 13px;
        }

        /* ══════════ LAYOUT ══════════ */
        .ide-root {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        .ide-titlebar {
            height: var(--titlebar-h);
            background: #323233;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            flex-shrink: 0;
            user-select: none;
            border-bottom: 1px solid rgba(0,0,0,0.3);
        }
        .ide-titlebar-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 12px;
            text-decoration: none;
        }
        .ide-titlebar-logo .logo-icon {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #007acc, #005a9e);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #fff;
        }
        .ide-titlebar-center {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: var(--text-mid);
        }
        .ide-titlebar-actions {
            display: flex;
            gap: 8px;
        }
        .tbar-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius);
            color: var(--text-main);
            padding: 3px 10px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-ui);
            transition: all 0.15s;
            text-decoration: none;
        }
        .tbar-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.3); }
        .tbar-btn.accent { background: var(--accent); border-color: transparent; color: #fff; }
        .tbar-btn.accent:hover { background: #0099ff; }

        /* ══════════ MAIN AREA ══════════ */
        .ide-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Activity Bar ── */
        .ide-activity {
            width: var(--activity-width);
            background: var(--bg-activity);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            gap: 4px;
            flex-shrink: 0;
            border-right: 1px solid rgba(0,0,0,0.2);
        }
        .act-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-mid);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .act-btn:hover { color: var(--text-bright); }
        .act-btn.active {
            color: #fff;
            border-left: 2px solid var(--accent);
        }
        .act-btn i { font-size: 1.1rem; }
        .act-separator { height: 1px; background: var(--border); width: 28px; margin: 4px 0; }
        .act-spacer { flex: 1; }

        /* ── Sidebar / File Explorer ── */
        .ide-sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid rgba(0,0,0,0.2);
            overflow: hidden;
            transition: width 0.2s;
        }
        .ide-sidebar.hidden { width: 0; overflow: hidden; }
        .sidebar-header {
            height: 35px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            background: var(--bg-sidebar-hd);
            border-bottom: 1px solid rgba(0,0,0,0.2);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-mid);
            flex-shrink: 0;
            user-select: none;
            justify-content: space-between;
        }
        .sidebar-header-actions { display: flex; gap: 2px; }
        .sb-icon-btn {
            width: 22px; height: 22px;
            border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-mid);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
            background: transparent;
            border: none;
        }
        .sb-icon-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        /* Tree Node */
        .tree-node { user-select: none; }
        .tree-item {
            display: flex;
            align-items: center;
            height: 22px;
            padding-left: calc(var(--depth, 0) * 12px + 8px);
            gap: 4px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            transition: background 0.1s;
        }
        .tree-item:hover { background: rgba(255,255,255,0.06); }
        .tree-item.active { background: rgba(0,122,204,0.25); color: #fff; }
        .tree-item.selected { background: rgba(0,122,204,0.15); }
        .tree-caret {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-mid);
            flex-shrink: 0;
            transition: transform 0.15s;
        }
        .tree-caret.open { transform: rotate(90deg); }
        .tree-caret.hidden { opacity: 0; pointer-events: none; }
        .tree-icon { width: 14px; height: 14px; flex-shrink: 0; font-size: 13px; }
        .tree-icon.folder { color: #e8b258; }
        .tree-icon.folder-open { color: #e8b258; }
        .tree-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }

        /* File type icons coloring */
        .tree-icon.py { color: #4584b6; }
        .tree-icon.js { color: #f7df1e; }
        .tree-icon.ts { color: #3178c6; }
        .tree-icon.html { color: #e34c26; }
        .tree-icon.css { color: #563d7c; }
        .tree-icon.php { color: #8892be; }
        .tree-icon.json { color: #cbcb41; }
        .tree-icon.sh { color: #89e051; }
        .tree-icon.md { color: #519aba; }
        .tree-icon.img { color: #a491f0; }
        .tree-icon.archive { color: #f44747; }
        .tree-icon.text { color: var(--text-mid); }

        .tree-children { }
        .tree-loading {
            padding: 6px 0 6px 32px;
            font-size: 12px;
            color: var(--text-mid);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tree-empty {
            padding: 6px 0 6px 32px;
            font-size: 12px;
            color: var(--text-mid);
            font-style: italic;
        }

        /* ══════════ EDITOR AREA ══════════ */
        .ide-editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* Tab Bar */
        .ide-tabbar {
            height: var(--tab-height);
            background: var(--bg-tab-bar);
            display: flex;
            align-items: stretch;
            flex-shrink: 0;
            overflow-x: auto;
            overflow-y: hidden;
            border-bottom: 1px solid rgba(0,0,0,0.3);
        }
        .ide-tabbar::-webkit-scrollbar { height: 3px; }
        .ide-tabbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        .ide-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px;
            height: 100%;
            background: var(--bg-tab);
            border-right: 1px solid rgba(0,0,0,0.25);
            cursor: pointer;
            white-space: nowrap;
            font-size: 12px;
            color: var(--text-mid);
            position: relative;
            min-width: 120px;
            max-width: 220px;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .ide-tab:hover { background: rgba(255,255,255,0.06); }
        .ide-tab.active {
            background: var(--bg-tab-act);
            color: var(--text-bright);
            border-top: 1px solid var(--accent);
        }
        .ide-tab .tab-icon { font-size: 12px; flex-shrink: 0; }
        .ide-tab .tab-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .ide-tab .tab-modified { color: var(--yellow); font-size: 14px; line-height: 1; flex-shrink: 0; }
        .ide-tab .tab-close {
            width: 18px; height: 18px;
            border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.15s, background 0.15s;
            flex-shrink: 0;
        }
        .ide-tab:hover .tab-close { opacity: 0.6; }
        .ide-tab .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.15); }

        /* Welcome / empty state */
        .ide-welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-editor);
            color: var(--text-mid);
            gap: 12px;
        }
        .ide-welcome i { font-size: 3rem; opacity: 0.2; }
        .ide-welcome h2 { font-size: 1rem; font-weight: 400; color: var(--text-main); }
        .ide-welcome p { font-size: 0.8rem; }

        /* Editor container */
        .ide-monaco-wrap {
            flex: 1;
            overflow: hidden;
            display: none;
        }
        .ide-monaco-wrap.active { display: block; }
        #monaco-container {
            width: 100%;
            height: 100%;
        }

        /* ── Status Bar ── */
        .ide-statusbar {
            height: var(--statusbar-h);
            background: var(--bg-statusbar);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 16px;
            flex-shrink: 0;
            font-size: 11px;
            color: rgba(255,255,255,0.9);
            user-select: none;
        }
        .statusbar-item {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: default;
        }
        .statusbar-item:hover { background: rgba(255,255,255,0.15); border-radius: 2px; padding: 1px 4px; }
        .statusbar-item i { font-size: 10px; }
        .statusbar-right { margin-left: auto; display: flex; gap: 16px; }
        #status-modified-indicator {
            display: none;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--yellow);
        }
        #status-modified-indicator.show { display: inline-block; }

        /* ── Right-click context menu ── */
        #tree-ctx {
            position: fixed;
            z-index: 9999;
            display: none;
            background: #252526;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 4px;
            min-width: 160px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .ctx-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 12px;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.1s;
        }
        .ctx-item:hover { background: var(--accent); color: #fff; }
        .ctx-item i { width: 12px; text-align: center; font-size: 11px; }
        .ctx-sep { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 3px 0; }

        /* ── Toast ── */
        #toast-stack {
            position: fixed;
            bottom: 36px;
            right: 18px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .toast {
            min-width: 240px;
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 12px;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: toastIn 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @keyframes toastIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:none; } }
        .toast.success { background: rgba(78,201,176,0.15); border: 1px solid rgba(78,201,176,0.25); color: #4ec9b0; }
        .toast.error   { background: rgba(244,71,71,0.15);  border: 1px solid rgba(244,71,71,0.25);  color: #f87171; }
        .toast.info    { background: rgba(0,122,204,0.15);  border: 1px solid rgba(0,122,204,0.25);  color: #4fc1ff; }

        /* ── Resize handle ── */
        .ide-resize-handle {
            width: 4px;
            background: transparent;
            cursor: col-resize;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .ide-resize-handle:hover { background: var(--accent); }

        /* ── Scrollbars ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        @media (max-width: 640px) {
            .ide-sidebar { display: none; }
            .ide-activity { display: none; }
        }
    </style>
</head>
<body>
{% csrf_token %}

<div class="ide-root">

    <!-- ══ Title Bar ══ -->
    <div class="ide-titlebar">
        <a href="/filemanager/?key={{ root_dir }}" class="ide-titlebar-logo" title="Back to File Manager">
            <div class="logo-icon"><i class="fa-solid fa-code"></i></div>
            VoidPanel IDE
        </a>
        <div class="ide-titlebar-center" id="titlebar-path">{{ root_name }}</div>
        <div class="ide-titlebar-actions">
            <button class="tbar-btn accent" id="btn-save-top" onclick="saveCurrentFile()" title="Save (Ctrl+S)">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
            <a href="/filemanager/?key={{ root_dir }}" class="tbar-btn" title="Back to File Manager">
                <i class="fa-solid fa-folder-open"></i> File Manager
            </a>
            <a href="/panel/" class="tbar-btn" title="Dashboard">
                <i class="fa-solid fa-gauge"></i>
            </a>
        </div>
    </div>

    <!-- ══ Body ══ -->
    <div class="ide-body">

        <!-- Activity Bar -->
        <div class="ide-activity" id="activity-bar">
            <div class="act-btn active" id="act-explorer" onclick="toggleSidebar()" title="Explorer">
                <i class="fa-solid fa-folder-tree"></i>
            </div>
            <div class="act-btn" onclick="showSearch()" title="Search">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="act-separator"></div>
            <div class="act-spacer"></div>
            <div class="act-btn" onclick="window.open('/terminal/','_blank')" title="Terminal">
                <i class="fa-solid fa-terminal"></i>
            </div>
        </div>

        <!-- Sidebar / Explorer -->
        <div class="ide-sidebar" id="ide-sidebar">
            <div class="sidebar-header">
                <span>Explorer</span>
                <div class="sidebar-header-actions">
                    <button class="sb-icon-btn" onclick="refreshTree()" title="Refresh">
                        <i class="fa-solid fa-rotate"></i>
                    </button>
                    <button class="sb-icon-btn" onclick="collapseAll()" title="Collapse All">
                        <i class="fa-solid fa-chevrons-up"></i>
                    </button>
                </div>
            </div>
            <div class="sidebar-scroll" id="tree-root"></div>
        </div>

        <!-- Resize handle -->
        <div class="ide-resize-handle" id="resize-handle"></div>

        <!-- Editor Area -->
        <div class="ide-editor-area">
            <!-- Tab Bar -->
            <div class="ide-tabbar" id="ide-tabbar"></div>

            <!-- Welcome screen -->
            <div class="ide-welcome" id="ide-welcome">
                <i class="fa-solid fa-code"></i>
                <h2>VoidPanel Web IDE</h2>
                <p>Click a file in the explorer to open it</p>
            </div>

            <!-- Monaco editor mount -->
            <div class="ide-monaco-wrap" id="ide-monaco-wrap">
                <div id="monaco-container"></div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="ide-statusbar">
        <div class="statusbar-item">
            <i class="fa-solid fa-code-branch"></i>
            <span>VoidPanel</span>
        </div>
        <div class="statusbar-item">
            <span id="status-modified-indicator"></span>
            <span id="status-text">Ready</span>
        </div>
        <div class="statusbar-right">
            <div class="statusbar-item" id="status-cursor">Ln 1, Col 1</div>
            <div class="statusbar-item" id="status-lang">—</div>
            <div class="statusbar-item">UTF-8</div>
        </div>
    </div>
</div>

<!-- Tree right-click menu -->
<div id="tree-ctx">
    <div class="ctx-item" id="ctx-open-file"><i class="fa-solid fa-file-code"></i> Open File</div>
    <div class="ctx-item" id="ctx-open-folder"><i class="fa-solid fa-folder-open"></i> Expand Folder</div>
    <hr class="ctx-sep">
    <div class="ctx-item" id="ctx-fm-open"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open in File Manager</div>
    <div class="ctx-item" id="ctx-download"><i class="fa-solid fa-download"></i> Download</div>
</div>

<!-- Toast stack -->
<div id="toast-stack"></div>

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════════ */
const ROOT_DIR  = "{{ root_dir|escapejs }}";
const CSRF      = document.querySelector('[name=csrfmiddlewaretoken]').value;

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function toast(msg, type = 'info', dur = 3500) {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
    el.innerHTML = `<i class="fa-solid ${icons[type] || 'fa-circle-info'}"></i> ${msg}`;
    document.getElementById('toast-stack').appendChild(el);
    setTimeout(() => el.remove(), dur);
}

function setStatus(text, color) {
    document.getElementById('status-text').textContent = text;
}

/* ═══════════════════════════════════════════════════════════════
   FILE ICON UTILITY
═══════════════════════════════════════════════════════════════ */
const EXT_ICON = {
    py: { cls: 'py',   fa: 'fa-brands fa-python' },
    js: { cls: 'js',   fa: 'fa-brands fa-js' },
    mjs:{ cls: 'js',   fa: 'fa-brands fa-js' },
    ts: { cls: 'ts',   fa: 'fa-solid fa-file-code' },
    tsx:{ cls: 'ts',   fa: 'fa-solid fa-file-code' },
    jsx:{ cls: 'js',   fa: 'fa-solid fa-file-code' },
    html:{ cls: 'html',fa: 'fa-brands fa-html5' },
    htm: { cls: 'html',fa: 'fa-brands fa-html5' },
    css: { cls: 'css', fa: 'fa-brands fa-css3-alt' },
    scss:{ cls: 'css', fa: 'fa-brands fa-css3-alt' },
    php: { cls: 'php', fa: 'fa-brands fa-php' },
    json:{ cls: 'json',fa: 'fa-solid fa-file-code' },
    yaml:{ cls: 'text',fa: 'fa-solid fa-file-code' },
    yml: { cls: 'text',fa: 'fa-solid fa-file-code' },
    sh:  { cls: 'sh',  fa: 'fa-solid fa-terminal' },
    bash:{ cls: 'sh',  fa: 'fa-solid fa-terminal' },
    md:  { cls: 'md',  fa: 'fa-brands fa-markdown' },
    sql: { cls: 'text',fa: 'fa-solid fa-database' },
    xml: { cls: 'html',fa: 'fa-solid fa-file-code' },
    svg: { cls: 'img', fa: 'fa-solid fa-image' },
    png: { cls: 'img', fa: 'fa-solid fa-image' },
    jpg: { cls: 'img', fa: 'fa-solid fa-image' },
    jpeg:{ cls: 'img', fa: 'fa-solid fa-image' },
    gif: { cls: 'img', fa: 'fa-solid fa-image' },
    webp:{ cls: 'img', fa: 'fa-solid fa-image' },
    zip: { cls: 'archive', fa: 'fa-solid fa-file-zipper' },
    tar: { cls: 'archive', fa: 'fa-solid fa-file-zipper' },
    gz:  { cls: 'archive', fa: 'fa-solid fa-file-zipper' },
    ini: { cls: 'text',fa: 'fa-solid fa-gear' },
    conf:{ cls: 'text',fa: 'fa-solid fa-gear' },
    env: { cls: 'text',fa: 'fa-solid fa-key' },
    txt: { cls: 'text',fa: 'fa-solid fa-file-lines' },
    log: { cls: 'text',fa: 'fa-solid fa-file-lines' },
};
function fileIconInfo(name) {
    const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
    const b   = name.toLowerCase();
    if (b === 'dockerfile') return { cls: 'sh', fa: 'fa-brands fa-docker' };
    if (b === '.env' || b.startsWith('.env.')) return { cls: 'text', fa: 'fa-solid fa-key' };
    return EXT_ICON[ext] || { cls: 'text', fa: 'fa-solid fa-file' };
}

/* ═══════════════════════════════════════════════════════════════
   TREE / FILE EXPLORER
═══════════════════════════════════════════════════════════════ */
let treeCtxTarget = null; // { path, type }

async function fetchTree(dirPath) {
    const r = await fetch(`/api/file-tree/?path=${encodeURIComponent(dirPath)}`);
    return await r.json();
}

function buildTreeItem(name, path, type, depth) {
    const node = document.createElement('div');
    node.className = 'tree-node';
    node.dataset.path = path;
    node.dataset.type = type;

    const item = document.createElement('div');
    item.className = 'tree-item';
    item.style.setProperty('--depth', depth);

    // Caret
    const caret = document.createElement('span');
    caret.className = 'tree-caret' + (type === 'file' ? ' hidden' : '');
    caret.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';

    // Icon
    const icon = document.createElement('span');
    icon.className = 'tree-icon';

    if (type === 'dir') {
        icon.classList.add('folder');
        icon.innerHTML = '<i class="fa-solid fa-folder"></i>';
    } else {
        const info = fileIconInfo(name);
        icon.classList.add(info.cls);
        icon.innerHTML = `<i class="${info.fa}"></i>`;
    }

    // Name
    const nameEl = document.createElement('span');
    nameEl.className = 'tree-name';
    nameEl.textContent = name;
    nameEl.title = path;

    item.appendChild(caret);
    item.appendChild(icon);
    item.appendChild(nameEl);
    node.appendChild(item);

    // Children container (for dirs)
    const children = document.createElement('div');
    children.className = 'tree-children';
    children.style.display = 'none';
    node.appendChild(children);

    // Events
    item.addEventListener('click', (e) => {
        e.stopPropagation();
        if (type === 'dir') {
            toggleDir(node, caret, icon, children, path, depth);
        } else {
            openFile(path, name);
            // Highlight active
            document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
        }
    });

    item.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        e.stopPropagation();
        treeCtxTarget = { path, type, name };
        showTreeCtx(e.clientX, e.clientY, type);
    });

    return node;
}

async function toggleDir(node, caret, icon, children, path, depth) {
    const caretIcon = caret.querySelector('i');
    if (children.style.display === 'none') {
        // Expand
        caret.classList.add('open');
        icon.innerHTML = '<i class="fa-solid fa-folder-open"></i>';
        children.style.display = '';

        if (children.innerHTML === '') {
            // Load children
            const loading = document.createElement('div');
            loading.className = 'tree-loading';
            loading.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';
            children.appendChild(loading);

            try {
                const data = await fetchTree(path);
                children.innerHTML = '';
                if (data.status !== 'success') {
                    const err = document.createElement('div');
                    err.className = 'tree-empty';
                    err.textContent = 'Error: ' + (data.message || 'Failed');
                    children.appendChild(err);
                    return;
                }
                const all = [
                    ...data.directories.map(d => ({ ...d, type: 'dir' })),
                    ...data.files.map(f => ({ ...f, type: 'file' })),
                ];
                if (all.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'tree-empty';
                    empty.textContent = 'Empty folder';
                    children.appendChild(empty);
                } else {
                    all.forEach(item => {
                        children.appendChild(buildTreeItem(item.name, item.path, item.type, depth + 1));
                    });
                }
            } catch (e) {
                children.innerHTML = '';
                const err = document.createElement('div');
                err.className = 'tree-empty';
                err.textContent = 'Failed to load';
                children.appendChild(err);
            }
        }
    } else {
        // Collapse
        caret.classList.remove('open');
        icon.innerHTML = '<i class="fa-solid fa-folder"></i>';
        children.style.display = 'none';
    }
}

async function initTree() {
    const container = document.getElementById('tree-root');
    container.innerHTML = '<div class="tree-loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>';

    try {
        const data = await fetchTree(ROOT_DIR);
        container.innerHTML = '';

        if (data.status !== 'success') {
            container.innerHTML = `<div class="tree-empty">Error: ${data.message || 'Unknown error'}</div>`;
            return;
        }

        // Root label
        const rootLabel = document.createElement('div');
        rootLabel.className = 'tree-item';
        rootLabel.style.setProperty('--depth', 0);
        rootLabel.style.fontWeight = '600';
        rootLabel.style.color = 'var(--text-bright)';
        rootLabel.style.fontSize = '11px';
        rootLabel.style.letterSpacing = '0.08em';
        rootLabel.style.textTransform = 'uppercase';
        rootLabel.style.padding = '8px 12px 4px';
        rootLabel.style.cursor = 'default';
        rootLabel.textContent = data.path.split('/').filter(Boolean).pop() || '/';
        container.appendChild(rootLabel);

        const all = [
            ...data.directories.map(d => ({ ...d, type: 'dir' })),
            ...data.files.map(f => ({ ...f, type: 'file' })),
        ];
        all.forEach(item => {
            container.appendChild(buildTreeItem(item.name, item.path, item.type, 0));
        });
    } catch (e) {
        container.innerHTML = '<div class="tree-empty">Failed to load file tree</div>';
    }
}

function refreshTree() {
    initTree();
}

function collapseAll() {
    document.querySelectorAll('.tree-children').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.tree-caret').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.tree-icon.folder-open').forEach(el => {
        el.classList.remove('folder-open');
        el.classList.add('folder');
        el.innerHTML = '<i class="fa-solid fa-folder"></i>';
    });
}

/* ── Tree Context Menu ── */
function showTreeCtx(x, y, type) {
    const menu = document.getElementById('tree-ctx');
    document.getElementById('ctx-open-file').style.display   = type === 'file' ? 'flex' : 'none';
    document.getElementById('ctx-open-folder').style.display = type === 'dir'  ? 'flex' : 'none';
    document.getElementById('ctx-download').style.display    = type === 'file' ? 'flex' : 'none';
    menu.style.display = 'block';
    menu.style.left = x + 'px';
    menu.style.top  = y + 'px';
    // Clamp
    setTimeout(() => {
        if (x + menu.offsetWidth > window.innerWidth)  menu.style.left = (x - menu.offsetWidth) + 'px';
        if (y + menu.offsetHeight > window.innerHeight) menu.style.top  = (y - menu.offsetHeight) + 'px';
    }, 0);
}
document.addEventListener('click', () => {
    document.getElementById('tree-ctx').style.display = 'none';
});
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') document.getElementById('tree-ctx').style.display = 'none';
});
document.getElementById('ctx-open-file').addEventListener('click', () => {
    if (treeCtxTarget) openFile(treeCtxTarget.path, treeCtxTarget.name);
});
document.getElementById('ctx-open-folder').addEventListener('click', () => {
    if (treeCtxTarget) {
        window.location.href = `/webide/${treeCtxTarget.path.replace(/^\//, '')}/`;
    }
});
document.getElementById('ctx-fm-open').addEventListener('click', () => {
    if (treeCtxTarget) {
        const fmPath = treeCtxTarget.type === 'dir' ? treeCtxTarget.path : treeCtxTarget.path.replace('/' + treeCtxTarget.name, '');
        window.open(`/filemanager/?key=${encodeURIComponent(fmPath)}`, '_blank');
    }
});
document.getElementById('ctx-download').addEventListener('click', () => {
    if (treeCtxTarget) {
        window.location.href = `/download/?key=${encodeURIComponent(treeCtxTarget.path)}`;
    }
});

/* ═══════════════════════════════════════════════════════════════
   TABS & EDITOR STATE
═══════════════════════════════════════════════════════════════ */
let editor = null;
let tabs   = [];       // { id, path, name, lang, model, modified }
let activeTab = null;  // tab id

function generateTabId() {
    return 'tab_' + Math.random().toString(36).substr(2, 8);
}

function findTab(path) {
    return tabs.find(t => t.path === path);
}

function renderTabs() {
    const bar = document.getElementById('ide-tabbar');
    bar.innerHTML = '';
    tabs.forEach(tab => {
        const el = document.createElement('div');
        el.className = 'ide-tab' + (tab.id === activeTab ? ' active' : '');
        el.dataset.id = tab.id;
        el.title = tab.path;

        const info = fileIconInfo(tab.name);
        el.innerHTML = `
            <span class="tab-icon tree-icon ${info.cls}"><i class="${info.fa}"></i></span>
            <span class="tab-name">${tab.name}</span>
            ${tab.modified ? '<span class="tab-modified">●</span>' : ''}
            <span class="tab-close" title="Close"><i class="fa-solid fa-xmark"></i></span>
        `;

        // Click tab to activate
        el.addEventListener('click', (e) => {
            if (e.target.closest('.tab-close')) {
                closeTab(tab.id);
            } else {
                activateTab(tab.id);
            }
        });

        // Middle-click to close
        el.addEventListener('mousedown', (e) => {
            if (e.button === 1) { e.preventDefault(); closeTab(tab.id); }
        });

        bar.appendChild(el);
    });

    // Scroll active tab into view
    const activeEl = bar.querySelector('.ide-tab.active');
    if (activeEl) activeEl.scrollIntoView({ block: 'nearest', inline: 'nearest' });
}

function activateTab(id) {
    activeTab = id;
    const tab = tabs.find(t => t.id === id);
    if (!tab) return;

    renderTabs();

    // Show editor, hide welcome
    document.getElementById('ide-welcome').style.display = 'none';
    document.getElementById('ide-monaco-wrap').classList.add('active');

    // Swap Monaco model
    if (editor && tab.model) {
        editor.setModel(tab.model);
        editor.focus();
    }

    updateStatusBarForTab(tab);
    document.getElementById('titlebar-path').textContent = tab.path;
}

function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    const tab = tabs[idx];
    if (tab.modified && !confirm(`"${tab.name}" has unsaved changes. Close anyway?`)) return;
    tab.model && tab.model.dispose();
    tabs.splice(idx, 1);

    if (activeTab === id) {
        if (tabs.length > 0) {
            activateTab(tabs[Math.max(0, idx - 1)].id);
        } else {
            activeTab = null;
            document.getElementById('ide-welcome').style.display = 'flex';
            document.getElementById('ide-monaco-wrap').classList.remove('active');
            document.getElementById('titlebar-path').textContent = ROOT_DIR.split('/').filter(Boolean).pop() || '/';
        }
    }
    renderTabs();
}

function updateStatusBarForTab(tab) {
    document.getElementById('status-lang').textContent = (tab.lang || 'plaintext').toUpperCase();
    const mod = document.getElementById('status-modified-indicator');
    mod.classList.toggle('show', !!tab.modified);
}

async function openFile(path, name) {
    // If already open, just switch to it
    const existing = findTab(path);
    if (existing) {
        activateTab(existing.id);
        return;
    }

    setStatus('Opening…');
    try {
        const resp = await fetch(`/api/file-content/?path=${encodeURIComponent(path)}`);
        const data = await resp.json();

        if (data.status !== 'success') {
            toast(data.message || 'Failed to open file', 'error');
            setStatus('Error');
            return;
        }

        // Create Monaco model
        const model = monaco.editor.createModel(data.content, data.language || 'plaintext');
        const tab = {
            id: generateTabId(),
            path: data.path,
            name: data.filename,
            lang: data.language,
            model,
            modified: false,
        };

        // Track changes
        model.onDidChangeContent(() => {
            tab.modified = true;
            const el = document.querySelector(`.ide-tab[data-id="${tab.id}"]`);
            if (el && !el.querySelector('.tab-modified')) {
                el.querySelector('.tab-name').insertAdjacentHTML('afterend', '<span class="tab-modified">●</span>');
            }
            const mod = document.getElementById('status-modified-indicator');
            if (activeTab === tab.id) mod.classList.add('show');
        });

        tabs.push(tab);
        activateTab(tab.id);
        setStatus('Ready');
    } catch (e) {
        toast('Network error opening file', 'error');
        setStatus('Error');
    }
}

/* ═══════════════════════════════════════════════════════════════
   SAVE
═══════════════════════════════════════════════════════════════ */
async function saveCurrentFile() {
    if (!activeTab || !editor) return;
    const tab = tabs.find(t => t.id === activeTab);
    if (!tab) return;

    setStatus('Saving…');
    const btn = document.getElementById('btn-save-top');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving…';

    try {
        const resp = await fetch('/api/webide-save/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
            body: JSON.stringify({ content: editor.getValue(), path: tab.path }),
        });
        const data = await resp.json();

        if (data.status === 'success') {
            tab.modified = false;
            renderTabs();
            document.getElementById('status-modified-indicator').classList.remove('show');
            toast('Saved — ' + tab.name, 'success');
            setStatus('Saved');
        } else {
            toast('Save failed: ' + (data.message || 'Unknown error'), 'error');
            setStatus('Save failed');
        }
    } catch (e) {
        toast('Network error while saving', 'error');
        setStatus('Error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save';
    }
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR TOGGLE
═══════════════════════════════════════════════════════════════ */
let sidebarOpen = true;
function toggleSidebar() {
    const sb  = document.getElementById('ide-sidebar');
    const btn = document.getElementById('act-explorer');
    sidebarOpen = !sidebarOpen;
    sb.classList.toggle('hidden', !sidebarOpen);
    btn.classList.toggle('active', sidebarOpen);
    if (editor) editor.layout();
}

function showSearch() {
    editor?.getAction('actions.find')?.run();
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR RESIZE
═══════════════════════════════════════════════════════════════ */
(function initResize() {
    const handle = document.getElementById('resize-handle');
    const sidebar = document.getElementById('ide-sidebar');
    let dragging = false, startX = 0, startW = 0;

    handle.addEventListener('mousedown', (e) => {
        dragging = true;
        startX = e.clientX;
        startW = sidebar.offsetWidth;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const newW = Math.max(150, Math.min(600, startW + (e.clientX - startX)));
        sidebar.style.width = newW + 'px';
        if (editor) editor.layout();
    });
    document.addEventListener('mouseup', () => {
        if (dragging) {
            dragging = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        }
    });
})();

/* ═══════════════════════════════════════════════════════════════
   UNSAVED GUARD
═══════════════════════════════════════════════════════════════ */
window.addEventListener('beforeunload', (e) => {
    const anyModified = tabs.some(t => t.modified);
    if (anyModified) {
        e.preventDefault();
        e.returnValue = 'You have unsaved changes — are you sure you want to leave?';
    }
});

/* ═══════════════════════════════════════════════════════════════
   MONACO INIT
═══════════════════════════════════════════════════════════════ */
require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
    monaco.editor.defineTheme('void-dark', {
        base: 'vs-dark',
        inherit: true,
        rules: [],
        colors: {
            'editor.background':           '#1e1e1e',
            'editor.lineHighlightBackground': '#2a2d2e',
            'editorLineNumber.foreground': '#858585',
            'editorGutter.background':     '#1e1e1e',
        }
    });

    editor = monaco.editor.create(document.getElementById('monaco-container'), {
        theme:         'void-dark',
        fontSize:      14,
        fontFamily:    'JetBrains Mono, Fira Code, Consolas, monospace',
        fontLigatures: true,
        lineHeight:    22,
        wordWrap:      'off',
        minimap:       { enabled: true },
        scrollBeyondLastLine: false,

        padding:       { top: 10, bottom: 10 },
        cursorBlinking:'smooth',
        cursorSmoothCaretAnimation: 'on',
        smoothScrolling: true,
        tabSize:       4,
        renderWhitespace: 'selection',
        bracketPairColorization: { enabled: true },
        guides:        { bracketPairs: true, indentation: true },
        formatOnPaste: true,
        contextmenu:   true,
    });

    // Cursor position tracking
    editor.onDidChangeCursorPosition((e) => {
        const pos = e.position;
        document.getElementById('status-cursor').textContent = `Ln ${pos.lineNumber}, Col ${pos.column}`;
    });

    // Ctrl+S save
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
        saveCurrentFile();
    });

    // Ctrl+W close tab
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyW, () => {
        if (activeTab) closeTab(activeTab);
    });

    // Init tree after Monaco is ready
    initTree();
});
