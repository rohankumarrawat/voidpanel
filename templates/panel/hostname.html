<script>
  
    // Function to get the CSRF token from the cookies
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }


    function updateForm() {
        const loadingBar = document.getElementById('pbar');
        loadingBar.style.display = 'block';
        let width = 0;
        const progressBar = document.getElementById('p-bar');
        const updateWidth = () => {
            if (width >= 100) {
                clearInterval(interval); // Stop the interval when reaching 100%
            } else {
                width++;
                progressBar.style.width = width + '%';
                progressBar.setAttribute('aria-valuenow', width);
                // Optional: Display percentage inside the bar
            }
        };
        const formData = new FormData(document.getElementById('myForm'));
        setInterval(updateWidth, 100);

        fetch('/updatesetup/', {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': GetCookie('csrftoken') // Include CSRF token
            }
        })
            .then(response => response.json())
            .then(data => {
                loadingBar.style.display = 'none';
                const div = document.getElementById('popup');
                div.classList.add('hidden');
                window.location.href = "/";

            })
            .catch(error => {
                loadingBar.style.display = 'none';
                document.getElementById('response').textContent = 'Error: ' + error.message;
                window.location.href = "/";
     
            });
    }

    // Function to get the CSRF token from the cookies
    function GetCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
<script>

    async function getPublicIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.error('Error fetching IP address:', error);
            return '400'; // Return error code for demonstration
        }
    }
    async function resolveHostname(hostname) {
        try {
          
            var urlf="https://dns.google/resolve?name="+hostname+"&type=A";
            
            const response = await fetch(urlf);
            const data = await response.json();
       
            if (data.Answer) {
                console.log(data.Answer[0].data);
                return data.Answer[0].data; // Return the first IP address from the response
            } else {
                

                return null;
            }
        } catch (error) {
          

            return null;
        }
    }
    // Async function to handle input changes
    async function handleInputChange() {
        const spinner = document.getElementById('spinner');
        const statusIcon = document.getElementById('status');
        const expectedIP = await resolveHostname(document.getElementById('hostname').value);
        spinner.style.display = 'block'; // Show the spinner
        statusIcon.style.display = 'none'; // Hide the status icon initially

        const ip = await getPublicIP(); // Await the IP fetch
   
     
       


        if ("{{serverip}}" == expectedIP) {
   
            statusIcon.textContent = '✔'; // Set checkmark if IP matches
            statusIcon.style.color = 'green'; // Optional: change color for checkmark
            var xc = document.getElementById('updateform');
            xc.onclick = updateForm;
            xc.disabled = false;

        } else {
            statusIcon.textContent = '✖'; // Set cross if IP does not match
            statusIcon.style.color = 'red'; // Optional: change color for cross

        }

        spinner.style.display = 'none'; // Hide the spinner
        statusIcon.style.display = 'block'; // Show the status icon
    }

    // Add event listener to the input field
    document.getElementById('hostname').addEventListener('input', handleInputChange);
</script>
