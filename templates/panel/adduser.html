<!doctype html>
<html lang="en">

<head>
    <title>:: VoidPanel :: Add Users</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="VoidPanel Add Users ">
    <meta name="author" content="Voidpanel, design by: Voidpanel.com">
    <link rel="icon" href="/static/icons/fav.png" type="image/x-icon">

    <!-- VENDOR CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/toastr/toastr.min.css">
    <link rel="stylesheet" href="/static/assets/vendor/charts-c3/plugin.css" />

    <!-- MAIN Project CSS file -->
    <link rel="stylesheet" href="/static/assets/css/main.css">

    <link rel="stylesheet" href="/static/assets/vendor/jvectormap/jquery-jvectormap-2.0.3.min.css" />
</head>

<body data-theme="light" class="font-nunito">

    <div id="wrapper" class="theme-cyan">

        <!-- Page Loader -->
        <div class="page-loader-wrapper">
            <div class="loader">
                <div class="m-t-30"><img src="/static/icons/fav.png" width="48" height="48" alt="VoidPanel">
                </div>
                <p>Please wait...</p>
            </div>
        </div>



        {% include 'navbar.html' %}

        <!-- main left menu -->
        {% include 'left.html' %}
        <!-- rightbar icon div -->
        {% include 'right.html' %}


        <!-- mani page content body part -->

        <div id="main-content">

            <div class="container-fluid">
                <div class="block-header">
                    <div class="row">
                        <div class="col-lg-6 col-md-6 col-sm-12">
                            <h2>Add Website</h2>
                            <ul class="breadcrumb">
                                <li class="breadcrumb-item"><a href="index.html"><i class="fa fa-dashboard"></i></a>
                                </li>
                                <li class="breadcrumb-item">Dashboard</li>
                                <li class="breadcrumb-item">Add User</li>

                            </ul>
                        </div>


                    </div>
                </div>


                <div id="addpermission" style="display: block; margin-top: 18px;">
                    <div class="modal-dialog modal-sm" role="document">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h6 class="title" id="defaultModalLabel">Add User </h6>
                            </div>
                            <form id="myForm" method="post" action="">{% csrf_token %}
                                <div class="modal-body">
                                    <div class="row clearfix">
                                        <div class="col-md-12 col-sm-12">
                                            <div class="form-group">
                                                <label class="control-inline fancy-checkbox">
                                            
                                                    <span>Domain Name</span>
                                                </label>
                                                <input type="text" name="addwebsite" id="myInput" class="form-control"
                                                    placeholder="example.com" required>
                                            </div>

                                            <div class="form-group">
                                                <label class="control-inline fancy-checkbox">
                                            
                                                    <span>Email</span>
                                                </label>
                                                <input type="email" name="email" id="myInput2" class="form-control"
                                                    placeholder="example@example.com" required>
                                            </div>

                                            <div class="form-group">

                                                <label class="control-inline fancy-checkbox">
                                            
                                                    <span>Password</span>
                                                </label>
                                                <input required type="password" id="password" name="password" placeholder="Password" id="password"
                                                    class="form-control">
            
            
                                            </div>
                                            <div id="match" class="form-group">
            
            
                                            </div>
                                            <div class="form-group">
                                                <input required type="password" oninput="confirm(this);" name="password1"
                                                    placeholder="Confirm Password" id="password1" class="form-control">
            
                                            </div>
                                            <div class="row clearfix">
                                                <div class="col-md-8 col-sm-12">
                                                    <div class="form-group">
                                                        <button type="button" class="btn btn-secondary" onclick="gen();">Generate
                                                            Password</button>
                                                    </div>
                                                </div>
                                                <div class="col-md-4 col-sm-12">
                                                    <div class="form-group">
                                                        <button type="button" class="btn btn-primary" onclick="genshow();"><i
                                                                class="fa  icon-eye"> </i></button>
                                                    </div>
                                                </div>
            
            
                                            </div>
                                            <label class="control-inline fancy-checkbox">
                                            
                                                <span>Choose Package  or</span>
                                    


                                                    <a target="_blank" href="/package">crete a new package</a>
                                        
                                            </label>


                                  
                                            
                                              
                                              
                                                    <select id="package" required name="domain"
                                                         class="form-control">

                                                      
                                                        {% for i in package %}
                                                      
                                                        <option selected value="{{i.name}}">{{i.name}}</option>
                                                        {% endfor %}

                                                    </select>
                                             

                                              
                                        


                                        </div>

                                        
                                    </div>
                                </div>
                                <div id="progress" style="display: none;">
                                    <div class="progress">
                                        <div id="pbar"
                                            class="progress-bar progress-bar-success progress-bar-striped active"
                                            role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
                                            style="width: 0%">

                                        </div>

                                    </div>
                                </div>
                                <div class="modal animated fadeIn show" id="eeee" style="display: none; margin-top: 300px;">
                                    <div class="modal-dialog modal-sm" role="document">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h6 class="title" id="defaultModalLabel">Status</h6>
                                            </div>
                
                                            <div class="modal-body">
                                                <div class="col-md-12 col-sm-12">
                                                    <div id="statusemail" style="text-align: center;" class="row clearfix">
                
                
                
                                                    </div>
                                                </div>
                                                <div class="modal-footer">
                                                    <button  onclick="closee();"
                                                        class="btn btn-danger">Close</button>
                                                </div>
                                            </div>
                
                                        </div>
                                    </div>
                                </div>
        
                                <div class="modal-footer">
                                    <button id="addemailbtn" disabled type="submit" style="display: block;"
                                        class="btn btn-primary">Add Website</button>


                                </div>


                            </form>

                        </div>
                    </div>
                </div>



            </div>
        </div>


        <!-- Modal for add user -->

        <script>
            function closee(){
                document.getElementById('eeee').style.display='none';
            }
        </script>

        <script>

            document.getElementById('myForm').addEventListener('submit', function (event) {
                // Prevent the default form submission
                event.preventDefault();
                var xx = document.getElementById("addemailbtn");
                xx.style.display = "none";
                let width = 0;
                const progressBar = document.getElementById('pbar');
                const progressContainer = document.getElementById('progress');
                progressContainer.style.display = 'block';  // Show progress bar
                function updateProgress() {
                    if (width <= 90) {
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;
                        width++;


                        progressBar.style.width = width + '%';  // Update visual width
                        progressBar.setAttribute('aria-valuenow', width);  // Update ARIA value
                        setTimeout(updateProgress, 1000);  // Call again in 2 seconds
                    }
                }
                updateProgress();
                // Capture the values from the input fields
                var website = document.getElementById('myInput').value;
                var email = document.getElementById('myInput2').value;
                var password = document.getElementById('password').value;
                var package = document.getElementById('package').value;
     
                

                // Create the data object to send
                var data = {
                    'web': website,
                    'email': email,
                    'password': password,
                    'package': package
                };

                // Send the data using fetch
                fetch("{% url 'addusermain' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}' // Include the CSRF token for security
                    },
                    body: JSON.stringify(data) // Convert the data to a JSON string
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {

                            setTimeout(function () {
                                window.location.href = "/listwebsite/";
                            }, 3000);

                        }

                        else if (data.status === 'already') {
                            
                            document.getElementById('eeee').style.display = "block";
                             document.getElementById('statusemail').innerHTML = "Domain Already Exist";
                            xx.style.display = "block";
                            progressContainer.style.display = 'none';
                            progressContainer.style.display = 'none';

                        }


                        else if (data.status === 'package') {
                            document.getElementById('eeee').style.display = "block";
                             document.getElementById('statusemail').innerHTML = "Coudn't find the package";
                            xx.style.display = "block";
                            progressContainer.style.display = 'none';
                            progressContainer.style.display = 'none';

                        }

                        else if (data.status === 'error') {
              
                            document.getElementById('eeee').style.display = "block";
                             document.getElementById('statusemail').innerHTML = "There was an error submitting your data. Please try again.";
                            xx.style.display = "block";
                            progressContainer.style.display = 'none';
                        } else {
                
                            document.getElementById('eeee').style.display = "block";
                             document.getElementById('statusemail').innerHTML = "Unexpected response from the server.!";
                            xx.style.display = "block";
                            progressContainer.style.display = 'none';
                        }
                    })
                    .catch(error => {
                        progressBar.style.width = 100 + '%';  // Update visual width
                        progressBar.setAttribute('aria-valuenow', 100);
               
                        document.getElementById('eeee').style.display = "block";
                             document.getElementById('statusemail').innerHTML = "User  have been successfully submitted!";
                        
                        // Optionally reset the form
                        document.getElementById('myForm').reset();
                        xx.style.display = "block";
                        setTimeout(function () {
                            window.location.href = "/listusers/";
                        }, 2000);
                    });
            });


        </script>
        <script>
            function confirm(input) {
                        const password = document.getElementById('password').value;
                        const password1 = document.getElementById('password1').value;
                        const pri = document.getElementById('match');
                        if (password === password1) {
                            pri.innerHTML = "Password Matched !";
                            document.getElementById('addemailbtn').disabled = false;
                        } else {
                            pri.innerHTML = 'Passwords do not match!';
                            document.getElementById('addemailbtn').disabled = true;
                        }


                    }
                    function gen() {
                        // Define characters to include in the password
                        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~";

                        let password = "";

                        // Loop to generate 8 characters randomly
                        for (let i = 0; i < 10; i++) {
                            const randomIndex = Math.floor(Math.random() * chars.length);
                            password += chars[randomIndex];
                        }


                        passw = document.getElementById('password');
                        passw1 = document.getElementById('password1');
                        passw.value = password;
                        passw1.value = password;
                        passw.placeholder = password;
                        passw1.placeholder = password;
                        

                        document.getElementById('addemailbtn').disabled = false;
                    }

                    function genshow(input) {
                        const password = document.getElementById('password');
                        const password1 = document.getElementById('password1');
                        if (password.type === "password") {
                            password.type = "text";
                            password1.type = "text";
                        } else {
                            password.type = "password";
                            password1.type = "password";
                        }
                    }

        </script>



        <!-- Javascript -->
        <script src="/static/assets/bundles/libscripts.bundle.js"></script>
        <script src="/static/assets/bundles/vendorscripts.bundle.js"></script>

        <!-- page vendor js file -->
        <script src="/static/assets/vendor/toastr/toastr.js"></script>
        <script src="/static/assets/bundles/c3.bundle.js"></script>


        <script src="/static/assets/bundles/jvectormap.bundle.js"></script> <!-- JVectorMap Plugin Js -->
        <script src="/static/assets/bundles/knob.bundle.js"></script> <!-- Jquery Knob-->


        <!-- page js file -->
        <script src="/static/assets/bundles/mainscripts.bundle.js"></script>
        <script src="/static/assets/bundles/chartjs.js"></script>
        <script src="/static/assets/index2.js"></script>


</body>

</html>
