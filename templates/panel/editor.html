<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidPanel Editor</title>

    <!-- Include Monaco Editor from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
    <script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>

    <style>
        /* Ensure the body and html take full height */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        /* Make the container take full height */
        #container {
            width: 100%;
            height: 100vh; /* Full viewport height */
            box-sizing: border-box;
        }
    </style>
    <style>
        /* Basic styling for the p tag */
        p.processing {
            font-size: 18px;
            font-weight: bold;

        }

        /* Animation for the dots */
        .dots::after {
            content: '';
            display: inline-block;
            width: 1em;
            text-align: left;
            animation: dots 1.5s steps(4, end) infinite;
        }

        /* Keyframes for the dots animation */
        @keyframes dots {

            0%,
            100% {
                content: '';
            }

            25% {
                content: '.';
            }

            50% {
                content: '..';
            }

            75% {
                content: '...';
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary  bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">File: {{ request.path|cut:'/editor_view/' }}</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            
            
            </ul>
            <form class="d-flex" role="search">
             
              <button class="btn btn-success me-2" onclick="saveFile(event)">Save</button>
           
            </form>
          </div>
        </div>
      </nav>
      <div id="saved" class="alert alert-success" style="display: none;">
        <strong>Success!</strong> Saved 
      </div>
      <div id="error" class="alert alert-danger" style="display: none;">
        <strong>Danger!</strong> Error Saving Files
      </div>
      <div class="modal animated fadeIn show" id="pro1" style="display: none; margin-top: 300px;">
        <div class="modal-dialog modal-sm" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <p class="processing">Processing<span class="dots"></span></p>

                </div>

            </div>
        </div>
    </div>
    <div id="container"></div>

    <script>
      var editorData = "{{ data|escapejs }}";
      var editorLanguage = "{{ language }}";
  
      require.config({ paths: { 'vs': 'https://unpkg.com/monaco-editor@latest/min/vs' } });
      require(['vs/editor/editor.main'], function() {
          var editor = monaco.editor.create(document.getElementById('container'), {
              value: editorData,
              language: editorLanguage
          });
  
          window.saveFile = function(event) {
              // Prevent default behavior (e.g., form submission)
              if (event) {
                  event.preventDefault();
              }
              document.getElementById('pro1').style.display="block";
                
              var content = editor.getValue();
              var path = "{{ request.path|cut:'/editor_view/' }}";
  
              fetch('/save/', {
                  method: 'POST',
                  headers: {
                      'Content-Type': 'application/json',
                      'X-CSRFToken': '{{ csrf_token }}'
                  },
                  body: JSON.stringify({ content: content, path: path })
              })
              .then(response => response.json())
              .then(data => {
                if (data.status === 'success') {
                    document.getElementById('pro1').style.display="none";
                    document.getElementById('saved').style.display='block';
                } else {
                    document.getElementById('pro1').style.display="none";
                    document.getElementById('error').style.display='block';

                }
            })
            .catch(error => {
                console.error('Error saving file:', error);
                document.getElementById('error').style.display='block';
            });
          };
      });
  </script>
  
</body>
