
<!doctype html>
<html lang="en">

<head>
<title>:: VoidPanel :: Login</title>


<link rel="icon" href="/static/icons/fav.png" type="image/x-icon">
<!-- VENDOR CSS -->

<link rel="stylesheet" href="/static/assets/vendor/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="/static/assets/vendor/font-awesome/css/font-awesome.min.css">

<!-- MAIN CSS -->
<link rel="stylesheet" href="/static/assets/css/main.css">

</head>

<body data-theme="light" class="font-nunito">
	<!-- WRAPPER -->
	<div id="wrapper" class="theme-cyan">
		<div class="vertical-align-wrap">
			<div class="vertical-align-middle auth-main">
				<div class="auth-box">
                   
					<div class="card">
                        <div class="header">
                            <p class="lead">Login to your Panel</p>
                        </div>
                        <div class="body">
                            <form class="form-auth-small" action="" method="post">{% csrf_token %}
                                <div class="form-group">
                                    <label for="signin-email" class="control-label sr-only">Username</label>
                                    <input type="text" class="form-control" name="username" id="signin-email" required  placeholder="Username">
                                </div>
                                <div class="form-group">
                                    <label for="signin-password" class="control-label sr-only">Password</label>
                                    <input type="password" class="form-control" name="password" id="signin-password"  required placeholder="Password">
                                </div>
                                {% for message in messages  %}            
                                <div class="form-group" role="alert">
                                      <strong>Message : </strong> {{ message }}
                                      </button>
                                    </div>
                                {% endfor %}   
                                
                                <button type="submit" class="btn btn-primary btn-lg btn-block">LOGIN</button>
                                
                            </form>
                        </div>
                    </div>
				</div>
			</div>
		</div>
	</div>
	<!-- END WRAPPER -->
</body>

</html>
