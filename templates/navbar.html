<script>
    /* ── Theme toggle — Dark is permanent, Light is coming soon ── */
    function panelToggleTheme() {
        var current = document.documentElement.getAttribute('data-theme') || 'dark';
        if (current === 'dark') {
            /* Light theme is not yet available — show toast */
            _vpShowComingSoon();
        } else {
            /* Already on light? Force back to dark */
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('vp-theme', 'dark');
        }
        /* ── Original two-way toggle (kept for future use) ──
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('vp-theme', next);
        ── end original ── */
    }

    function _vpShowComingSoon() {
        /* Remove any existing toast */
        var old = document.getElementById('vp-cs-toast');
        if (old) old.remove();

        var toast = document.createElement('div');
        toast.id = 'vp-cs-toast';
        toast.innerHTML = '<span style="font-size:1.1rem;">🌙</span> <span>Light Theme — <strong>Coming Soon</strong></span>';
        Object.assign(toast.style, {
            position: 'fixed',
            bottom: '28px',
            right: '28px',
            background: 'linear-gradient(135deg, #1e1b4b, #312e81)',
            color: '#e0e7ff',
            padding: '13px 22px',
            borderRadius: '12px',
            boxShadow: '0 8px 32px rgba(99,102,241,0.35)',
            border: '1px solid rgba(129,140,248,0.3)',
            display: 'flex',
            alignItems: 'center',
            gap: '10px',
            fontSize: '0.88rem',
            fontWeight: '600',
            zIndex: '99999',
            opacity: '0',
            transform: 'translateY(12px)',
            transition: 'opacity 0.28s ease, transform 0.28s ease',
            pointerEvents: 'none',
            letterSpacing: '0.01em',
        });
        document.body.appendChild(toast);

        /* Animate in */
        requestAnimationFrame(function () {
            requestAnimationFrame(function () {
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';
            });
        });

        /* Animate out after 2.8 s */
        setTimeout(function () {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(12px)';
            setTimeout(function () { toast.remove(); }, 300);
        }, 2800);
    }
</script>

    .quota-ring {
        transform: scale(0.9);
        transform-origin: center;
    }

    /* ── Page titles: smaller font ── */
    h1, .page-title { font-size: 1.3rem !important; }
    h2 { font-size: 1.1rem !important; }
}

/* Extra small screens */
@media (max-width: 480px) {
    .stats-strip,
    .stat-grid,
    .dash-grid,
    .util-grid,
    .quick-grid {
        grid-template-columns: 1fr !important;
    }

    .ctrl-grid {
        grid-template-columns: 1fr 1fr !important;
    }

    /* Hide non-essential table columns on very small screens */
    .col-hide-xs {
        display: none !important;
    }

    /* Full-width buttons on small screens */
    .btn-full-xs {
        width: 100% !important;
        margin: 4px 0 !important;
    }
}

/* ── Hamburger button for sidebar (mobile) ── */
.vp-hamburger {
    display: none;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.2);
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #818cf8;
    font-size: 1rem;
    transition: background 0.2s;
    flex-shrink: 0;
}
.vp-hamburger:hover { background: rgba(99,102,241,0.22); }
@media (max-width: 768px) {
    .vp-hamburger { display: flex; }
}

/* ── Sidebar overlay backdrop (mobile) ── */
.sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 9998;
    backdrop-filter: blur(2px);
}
.sidebar-backdrop.active { display: block; }
</style>

<script>
/* ── Mobile sidebar toggle ── */
(function() {
    function initMobileSidebar() {
        var sidebar = document.getElementById('left-sidebar')
                   || document.querySelector('.sidebar')
                   || document.querySelector('.left-panel')
                   || document.querySelector('nav.sidebar');
        if (!sidebar) return;

        /* Create backdrop */
        var backdrop = document.createElement('div');
        backdrop.className = 'sidebar-backdrop';
        backdrop.id = 'sidebar-backdrop';
        document.body.appendChild(backdrop);

        /* Find or create hamburger button */
        var hamburger = document.getElementById('vp-hamburger-btn');
        if (!hamburger) {
            hamburger = document.createElement('button');
            hamburger.id = 'vp-hamburger-btn';
            hamburger.className = 'vp-hamburger';
            hamburger.setAttribute('aria-label', 'Toggle menu');
            hamburger.innerHTML = '<i class="fa-solid fa-bars"></i>';
            /* Prepend to topbar/navbar */
            var topbar = document.querySelector('.topbar-content')
                       || document.querySelector('.navbar-header')
                       || document.querySelector('.top-bar')
                       || document.querySelector('.header-inner');
            if (topbar) topbar.prepend(hamburger);
        }

        function openSidebar() {
            sidebar.classList.add('sidebar-open');
            backdrop.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeSidebar() {
            sidebar.classList.remove('sidebar-open');
            backdrop.classList.remove('active');
            document.body.style.overflow = '';
        }

        hamburger.addEventListener('click', function() {
            if (sidebar.classList.contains('sidebar-open')) closeSidebar();
            else openSidebar();
        });
        backdrop.addEventListener('click', closeSidebar);

        /* Close sidebar on navigation link click (mobile UX) */
        sidebar.querySelectorAll('a').forEach(function(link) {
            link.addEventListener('click', function() {
                if (window.innerWidth <= 768) closeSidebar();
            });
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initMobileSidebar);
    } else {
        initMobileSidebar();
    }
})();
</script>
