<!-- VoidPanel SVG Logo — Use inline or as <img src="/static/logo.svg"> -->
<svg xmlns="http://www.w3.org/2000/svg" width="180" height="40" viewBox="0 0 180 40" role="img" aria-label="VoidPanel logo">
  <title>VoidPanel</title>
  <!-- Icon: dark square with server stack bars -->
  <rect x="0" y="4" width="34" height="34" rx="8" ry="8" fill="#0f172a"/>
  <!-- Server bars -->
  <rect x="7" y="13" width="20" height="4" rx="1.5" fill="#ffffff" opacity="0.9"/>
  <rect x="7" y="19.5" width="14" height="4" rx="1.5" fill="#ffffff" opacity="0.7"/>
  <rect x="7" y="26" width="10" height="4" rx="1.5" fill="#3b82f6" opacity="0.9"/>
  <!-- Wordmark: Void (dark) + Panel (blue) -->
  <text x="43" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.5" fill="#0f172a">Void</text>
  <text x="91" y="28" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.5" fill="#2563eb">Panel</text>
</svg>
