# ============================================================
#  Nginx config for voidpanel.com
#  Place at: /etc/nginx/sites-available/voidpanel.com
#  Symlink: ln -s /etc/nginx/sites-available/voidpanel.com \
#                 /etc/nginx/sites-enabled/voidpanel.com
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name voidpanel.com www.voidpanel.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name voidpanel.com www.voidpanel.com;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/voidpanel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voidpanel.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Static and media assets are served directly from Django settings ──

    # Django-collected static files
    location /static/ {
        alias /var/www/voidpanel.com/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Media uploads
    location /media/ {
        alias /var/www/voidpanel.com/media/;
        expires 7d;
    }

    # ── Everything else → Django (Gunicorn) ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        client_max_body_size 100M;
    }
}
