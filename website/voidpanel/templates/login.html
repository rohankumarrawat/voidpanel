{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — VoidPanel</title>
    <meta name="description" content="Sign in to your VoidPanel account to manage your server, websites, DNS, SSL and more.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/fav.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/assets/css/void-modern.css">
</head>
<body>

{% include 'header.html' %}

<section class="auth-section">
    <div class="glass-card auth-card animate-up">
        <div class="auth-logo">
            <img src="/static/fav.png" alt="VoidPanel">
            <span><span style="color:var(--accent);">Void</span>Panel</span>
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to manage your server and hosting.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-msg">
                    <i class="fas fa-circle-exclamation"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="/login/" id="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="login-email">Email Address</label>
                <input
                    type="email"
                    id="login-email"
                    name="Email"
                    class="form-control-void"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                >
            </div>
            <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <div style="position:relative;">
                    <input
                        type="password"
                        id="login-password"
                        name="password"
                        class="form-control-void"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                        style="padding-right:44px;"
                    >
                    <button type="button" onclick="togglePwd('login-password', 'eye-icon')"
                        style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.9rem;">
                        <i class="fas fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-void btn-void-primary w-100" style="justify-content:center;margin-top:8px;" id="login-submit">
                <i class="fas fa-arrow-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div class="auth-divider">— or —</div>
        <p class="auth-link" style="text-align:center;font-size:0.88rem;color:var(--text-secondary);">
            Don't have an account? <a href="/register/">Create one</a>
        </p>
    </div>
</section>

<script>
function togglePwd(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}
</script>

</body>
</html>
