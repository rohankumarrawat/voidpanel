{% load static %}
<nav class="void-nav" id="voidNav">
    <a href="/" class="nav-brand">
        <img src="/static/fav.png" alt="VoidPanel">
        <span>Void</span>Panel
    </a>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/aboutus/">About</a>
        <a href="/blogs/">Blog</a>
        <a href="/docs/">Docs</a>
        <a href="/whmcs/">WHMCS</a>
    </div>

    <div class="nav-cta">
        {% if request.user.is_authenticated %}
            <a href="/" class="btn-void btn-void-outline">
                <i class="fas fa-user-circle"></i> {{ request.user }}
            </a>
        {% else %}
            <a href="/login/" class="btn-void btn-void-outline">Login</a>
            <a href="/register/" class="btn-void btn-void-primary">Get Started</a>
        {% endif %}
    </div>

    <div class="hamburger" id="hamburger" onclick="toggleMobileMenu()" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
    </div>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
    <a href="/">Home</a>
    <a href="/aboutus/">About</a>
    <a href="/blogs/">Blog</a>
    <a href="/docs/">Docs</a>
    <a href="/whmcs/">WHMCS</a>
    {% if request.user.is_authenticated %}
        <a href="/">{{ request.user }}</a>
    {% else %}
        <a href="/login/" class="btn-void btn-void-outline w-100" style="text-align:center;">Login</a>
        <a href="/register/" class="btn-void btn-void-primary w-100" style="text-align:center;">Get Started</a>
    {% endif %}
</div>

<script>
function toggleMobileMenu() {
    document.getElementById('mobileMenu').classList.toggle('open');
}
window.addEventListener('scroll', () => {
    const nav = document.getElementById('voidNav');
    if (window.scrollY > 30) {
        nav.classList.add('scrolled');
    } else {
        nav.classList.remove('scrolled');
    }
});
</script>
